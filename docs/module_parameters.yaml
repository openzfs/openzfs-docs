# Curated data for the Module Parameters page.
#
# scripts/module_params.py takes the parameter list, types, defaults and
# one-line descriptions straight from the OpenZFS sources and man pages;
# this file holds only what cannot be derived from them:
#
#   tags            keywords used to group parameters on the page
#   range           valid values, when the man page does not say
#   when_to_change  why an administrator would touch this parameter
#   verification    how to check the setting took effect
#   notes           any further explanation
#
# "make module_params_check" validates this file and fails on:
#
#   - a key that is not a real parameter name, in any released version
#   - a field other than the five above, an empty one, or one of the
#     wrong type
#   - a malformed or duplicated tag, or two tags that join into a third
#     one, which is what a tag torn across two lines looks like
#
# and warns about a default that contradicts the range documented here,
# a release named in the text that OpenZFS never had, and parameters
# that carry no notes at all yet.
#
# "range" may either name the bounds, "1 to 100", or explain each value,
# "0=disabled, 1=enabled"; the latter is rendered as a table.

dbuf_cache_hiwater_pct:
  notes: The ``dbuf_cache_hiwater_pct`` and dbuf_cache_lowater_pct define the
    operating range for dbuf cache evict thread. The hiwater and lowater are percentages
    of the dbuf_cache_max_bytes value. When the dbuf cache grows above ((100%
    + ``dbuf_cache_hiwater_pct``) \* dbuf_cache_max_bytes) then the dbuf cache
    thread begins evicting. When the dbug cache falls below ((100% - dbuf_cache_lowater_pct)
    \* dbuf_cache_max_bytes) then the dbuf cache thread stops evicting.
  range: 0 to UINT_MAX
  tags:
  - dbuf_cache
  when_to_change: Testing dbuf cache algorithms
dbuf_cache_lowater_pct:
  notes: The dbuf_cache_hiwater_pct and dbuf_cache_lowater_pct define the operating
    range for dbuf cache evict thread. The hiwater and lowater are percentages
    of the dbuf_cache_max_bytes value. When the dbuf cache grows above ((100%
    + dbuf_cache_hiwater_pct) \* dbuf_cache_max_bytes) then the dbuf cache thread
    begins evicting. When the dbug cache falls below ((100% - ``dbuf_cache_lowater_pct``)
    \* dbuf_cache_max_bytes) then the dbuf cache thread stops evicting.
  range: 0 to UINT_MAX
  tags:
  - dbuf_cache
  when_to_change: Testing dbuf cache algorithms
dbuf_cache_max_bytes:
  notes: '``dbuf_cache_max_bytes`` sets the size of the dbuf cache in bytes. This
    is an alternate method for setting dbuf cache size than dbuf_cache_shift Performance
    tuning of dbuf cache can be monitored using: - ``dbufstat`` command - node_exporter
    ZFS module for prometheus environments - telegraf ZFS plugin for general-purpose
    metric collection - ``/proc/spl/kstat/zfs/dbufstats`` kstat'
  range: 0 = use dbuf_cache_shift to ARC ``c_max``
  tags:
  - ARC
  - dbuf_cache
dbuf_cache_max_shift:
  notes: The dbuf_cache_max_bytes minimum is the lesser of dbuf_cache_max_bytes
    and the current ARC target size (``c``) >> ``dbuf_cache_max_shift``
  range: 1 to 63
  tags:
  - dbuf_cache
  when_to_change: Testing dbuf cache algorithms
dbuf_cache_shift:
  notes: '``dbuf_cache_shift`` sets the size of the dbuf cache as a fraction of
    ARC target size. This is an alternate method for setting dbuf cache size than
    dbuf_cache_max_bytes. dbuf_cache_max_bytes overrides ``dbuf_cache_shift``
    This value is a "shift" representing the fraction of ARC target size (``grep
    -w c /proc/spl/kstat/zfs/arcstats``). The ARC target size is shifted to the
    right. Thus a value of ''2'' results in the fraction = 1/4, while a value
    of ''5'' results in the fraction = 1/32. Performance tuning of dbuf cache
    can be monitored using: - ``dbufstat`` command - node_exporter ZFS module
    for prometheus environments - telegraf ZFS plugin for general-purpose metric
    collection - ``/proc/spl/kstat/zfs/dbufstats`` kstat'
  range: 5 to MAX_INT
  tags:
  - ARC
  - dbuf_cache
  when_to_change: to improve performance of read-intensive channel programs
dbuf_metadata_cache_max_bytes:
  notes: '``dbuf_metadata_cache_max_bytes`` sets the size of the dbuf metadata
    cache as a number of bytes. This is an alternate method for setting dbuf metadata
    cache size than dbuf_metadata_cache_shift dbuf_metadata_cache_max_bytes overrides
    ``dbuf_metadata_cache_shift``'
  range: 0 = use dbuf_metadata_cache_shift to ARC ``c_max``
  tags:
  - dbuf_cache
dbuf_metadata_cache_shift:
  notes: '``dbuf_metadata_cache_shift`` sets the size of the dbuf metadata cache
    as a fraction of ARC target size. This is an alternate method for setting
    dbuf metadata cache size than dbuf_metadata_cache_max_bytes. dbuf_metadata_cache_max_bytes
    overrides ``dbuf_metadata_cache_shift`` This value is a "shift" representing
    the fraction of ARC target size (``grep -w c /proc/spl/kstat/zfs/arcstats``).
    The ARC target size is shifted to the right. Thus a value of ''2'' results
    in the fraction = 1/4, while a value of ''6'' results in the fraction = 1/64.'
  range: practical range is ( dbuf_cache_shift + 1) to MAX_INT
  tags:
  - ARC
  - dbuf_cache
dmu_object_alloc_chunk_shift:
  notes: Each of the concurrent object allocators grabs ``2^dmu_object_alloc_chunk_shift``
    dnode slots at a time. The default is to grab 128 slots, or 4 blocks worth.
    This default value was experimentally determined to be the lowest value that
    eliminates the measurable effect of lock contention in the DMU object allocation
    code path.
  range: 7 to 9
  tags:
  - DMU
  - allocation
  when_to_change: If the workload creates many files concurrently on a system
    with many CPUs, then increasing ``dmu_object_alloc_chunk_shift`` can decrease
    lock contention
icp_aes_impl:
  notes: 'By default, ZFS will choose the highest performance, hardware-optimized
    implementation of the AES encryption algorithm. The ``icp_aes_impl`` tunable
    overrides this automatic choice. Note: ``icp_aes_impl`` is set in the ``icp``
    kernel module, not the ``zfs`` kernel module. To observe the available options
    ``cat /sys/module/icp/parameters/icp_aes_impl`` The default option is shown
    in brackets ''[]'''
  range: varies by hardware
  tags:
  - encryption
  when_to_change: debugging ZFS encryption on hardware
icp_gcm_impl:
  notes: 'By default, ZFS will choose the highest performance, hardware-optimized
    implementation of the GCM encryption algorithm. The ``icp_gcm_impl`` tunable
    overrides this automatic choice. Note: ``icp_gcm_impl`` is set in the ``icp``
    kernel module, not the ``zfs`` kernel module. To observe the available options
    ``cat /sys/module/icp/parameters/icp_gcm_impl`` The default option is shown
    in brackets ''[]'''
  range: varies by hardware
  tags:
  - encryption
  when_to_change: debugging ZFS encryption on hardware
ignore_hole_birth:
  notes: '.. note:: Renamed to send_holes_without_birth_time in v2.4.0 (commit
    284580c87). When set, the hole_birth optimization will not be used and all
    holes will always be sent by ``zfs send``.'
  range: 0=disabled, 1=enabled
  tags:
  - send
  when_to_change: Enable if you suspect your datasets are affected by a bug in
    hole_birth during ``zfs send`` operations
l2arc_exclude_special:
  notes: Controls whether buffers present on special vdevs are eligible for caching
    into L2ARC.
  range: 0=disabled, 1=enabled
  tags:
  - ARC
  - L2ARC
  - special_vdev
  when_to_change: If cache and special devices exist and caching data on special
    devices in L2ARC is not desired
l2arc_feed_again:
  notes: Turbo L2ARC cache warm-up. When the L2ARC is cold the fill interval will
    be set to aggressively fill as fast as possible.
  range: 0=disabled, 1=enabled
  tags:
  - ARC
  - L2ARC
  when_to_change: If cache devices exist and it is desired to fill them as fast
    as possible
l2arc_feed_min_ms:
  notes: Minimum time period for aggressively feeding the L2ARC. The L2ARC feed
    thread wakes up once per second (see l2arc_feed_secs) to look for data to
    feed into the L2ARC. ``l2arc_feed_min_ms`` only affects the turbo L2ARC cache
    warm-up and allows the aggressiveness to be adjusted.
  range: 0 to (1000 \* l2arc_feed_secs)
  tags:
  - ARC
  - L2ARC
  when_to_change: If cache devices exist and l2arc_feed_again and the feed is
    too aggressive, then this tunable can be adjusted to reduce the impact of
    the fill
l2arc_feed_secs:
  notes: Seconds between waking the L2ARC feed thread. One feed thread works for
    all cache devices in turn. If the pool that owns a cache device is imported
    readonly, then the feed thread is delayed 5 \* l2arc_feed_secs before moving
    onto the next cache device. If multiple pools are imported with cache devices
    and one pool with cache is imported readonly, the L2ARC feed rate to all caches
    can be slowed.
  range: 1 to UINT64_MAX
  tags:
  - ARC
  - L2ARC
  when_to_change: Do not change
l2arc_headroom:
  notes: How far through the ARC lists to search for L2ARC cacheable content,
    expressed as a multiplier of l2arc_write_max
  range: 0 to UINT64_MAX
  tags:
  - ARC
  - L2ARC
  when_to_change: If the rate of change in the ARC is faster than the overall
    L2ARC feed rate, then increasing l2arc_headroom can increase L2ARC efficiency.
    Setting the value too large can cause the L2ARC feed thread to consume more
    CPU time looking for data to feed. Setting to 0 disables the headroom limit,
    allowing the full length of ARC lists to be searched for cacheable content.
l2arc_headroom_boost:
  notes: Percentage scale for l2arc_headroom when L2ARC contents are being successfully
    compressed before writing.
  range: 100 to UINT64_MAX, when set to 100, the L2ARC headroom boost feature
    is effectively disabled
  tags:
  - ARC
  - L2ARC
  when_to_change: If average compression efficiency is greater than 2:1, then
    increasing l2arc_headroom_boost can increase the L2ARC feed rate
l2arc_meta_percent:
  notes: Percent of ARC size allowed for L2ARC-only headers. Since L2ARC buffers
    are not evicted on memory pressure, too large amount of headers on system
    with irrationally large L2ARC can render it slow or unusable. This parameter
    limits L2ARC writes and rebuild to achieve it.
  range: 0 to 100
  tags:
  - ARC
  - L2ARC
  when_to_change: When workload really require enormous L2ARC.
l2arc_mfuonly:
  notes: Controls whether only MFU metadata and data are cached from ARC into
    L2ARC. This may be desirable to avoid wasting space on L2ARC when reading/writing
    large amounts of data that are not expected to be accessed more than once.
    By default both MRU and MFU data and metadata are cached in the L2ARC.
  range: 0=store MRU and MFU blocks in cache device, 1=store MFU blocks in cache
    device
  tags:
  - ARC
  - L2ARC
  when_to_change: When accessing a large amount of data only once.
l2arc_nocompress:
  notes: '.. note:: Removed in v0.7.0 by commit d3c2ae1c0 ("OpenZFS 6950 - ARC
    should cache compressed data"). The ARC now always caches compressed data,
    making this toggle unnecessary. No replacement parameter. Disable writing
    compressed data to cache devices. Disabling allows the legacy behavior of
    writing decompressed data to cache devices.'
  range: 0=store compressed blocks in cache device, 1=store uncompressed blocks
    in cache device
  tags:
  - ARC
  - L2ARC
  when_to_change: When testing compressed L2ARC feature
l2arc_noprefetch:
  notes: Disables writing prefetched, but unused, buffers to cache devices.
  range: 0=write prefetched but unused buffers to cache devices, 1=do not write
    prefetched but unused buffers to cache devices
  tags:
  - ARC
  - L2ARC
  - prefetch
  when_to_change: Setting to 0 can increase L2ARC hit rates for workloads where
    the ARC is too small for a read workload that benefits from prefetching. Also,
    if the main pool devices are very slow, setting to 0 can improve some workloads
    such as backups.
l2arc_norw:
  notes: Disables writing to cache devices while they are being read.
  range: 0=read and write simultaneously, 1=avoid writes when reading for antique
    SSDs
  tags:
  - ARC
  - L2ARC
  when_to_change: In the early days of SSDs, some devices did not perform well
    when reading and writing simultaneously. Modern SSDs do not have these issues.
l2arc_rebuild_blocks_min_l2size:
  notes: The minimum required size (in bytes) of an L2ARC device in order to write
    log blocks in it. The log blocks are used upon importing the pool to rebuild
    the persistent L2ARC. For L2ARC devices less than 1GB the overhead involved
    offsets most of benefit so log blocks are not written for cache devices smaller
    than this.
  range: 0 to UINT64_MAX
  tags:
  - ARC
  - L2ARC
  when_to_change: The cache device is small and the pool is frequently imported.
l2arc_rebuild_enabled:
  notes: Rebuild the persistent L2ARC when importing a pool.
  range: 0=disable persistent L2ARC rebuild, 1=enable persistent L2ARC rebuild
  tags:
  - ARC
  - L2ARC
  when_to_change: If there are problems importing a pool or attaching an L2ARC
    device.
l2arc_trim_ahead:
  notes: Once the cache device has been filled TRIM ahead of the current write
    size ``l2arc_write_max`` on L2ARC devices by this percentage. This can speed
    up future writes depending on the performance characteristics of the cache
    device. When set to 100% TRIM twice the space required to accommodate upcoming
    writes. A minimum of 64MB will be trimmed. If set it enables TRIM of the whole
    L2ARC device when it is added to a pool. By default, this option is disabled
    since it can put significant stress on the underlying storage devices.
  range: 0 to 100
  tags:
  - ARC
  - L2ARC
  when_to_change: Consider setting for cache devices which efficiently handle
    TRIM commands.
l2arc_write_boost:
  notes: Until the ARC fills, increases the L2ARC fill rate l2arc_write_max by
    ``l2arc_write_boost``.
  range: 0 to UINT64_MAX
  tags:
  - ARC
  - L2ARC
  when_to_change: To fill the cache devices more aggressively after pool import.
l2arc_write_max:
  notes: Maximum number of bytes to be written to each cache device for each L2ARC
    feed thread interval (see l2arc_feed_secs). The actual limit can be adjusted
    by l2arc_write_boost. By default l2arc_feed_secs is 1 second, delivering a
    maximum write workload to cache devices of 8 MiB/sec.
  range: 1 to UINT64_MAX
  tags:
  - ARC
  - L2ARC
  when_to_change: If the cache devices can sustain the write workload, increasing
    the rate of cache device fill when workloads generate new data at a rate higher
    than l2arc_write_max can increase L2ARC hit rate
metaslab_aliquot:
  notes: Sets the metaslab granularity. Nominally, ZFS will try to allocate this
    amount of data to a top-level vdev before moving on to the next top-level
    vdev. This is roughly similar to what would be referred to as the "stripe
    size" in traditional RAID arrays. When tuning for HDDs, it can be more efficient
    to have a few larger, sequential writes to a device rather than switching
    to the next device. Monitoring the size of contiguous writes to the disks
    relative to the write throughput can be used to determine if increasing ``metaslab_aliquot``
    can help. For modern devices, it is unlikely that decreasing ``metaslab_aliquot``
    from the default will help. If there is only one top-level vdev, this tunable
    is not used.
  range: 0 to UINT64_MAX
  tags:
  - allocation
  - metaslab
  - vdev
  when_to_change: If write performance increases as devices more efficiently write
    larger, contiguous blocks
metaslab_bias_enabled:
  notes: Enables metaslab group biasing based on a top-level vdev's utilization
    relative to the pool. Nominally, all top-level devs are the same size and
    the allocation is spread evenly. When the top-level vdevs are not of the same
    size, for example if a new (empty) top-level is added to the pool, this allows
    the new top-level vdev to get a larger portion of new allocations.
  range: 0=spread evenly across top-level vdevs, 1=bias spread to favor less full
    top-level vdevs
  tags:
  - allocation
  - metaslab
  - vdev
  when_to_change: If a new top-level vdev is added and you do not want to bias
    new allocations to the new top-level vdev
metaslab_debug_load:
  notes: When enabled, all metaslabs are loaded into memory during pool import.
    Nominally, metaslab space map information is loaded and unloaded as needed
    (see metaslab_debug_unload) It is difficult to predict how much RAM is required
    to store a space map. An empty or completely full metaslab has a small space
    map. However, a highly fragmented space map can consume significantly more
    memory. Enabling ``metaslab_debug_load`` can increase pool import time.
  range: 0=do not load all metaslab info at pool import, 1=dynamically load metaslab
    info as needed
  tags:
  - allocation
  - memory
  - metaslab
  when_to_change: When RAM is plentiful and pool import time is not a consideration
metaslab_debug_unload:
  notes: When enabled, prevents metaslab information from being dynamically unloaded
    from RAM. Nominally, metaslab space map information is loaded and unloaded
    as needed (see metaslab_debug_load) It is difficult to predict how much RAM
    is required to store a space map. An empty or completely full metaslab has
    a small space map. However, a highly fragmented space map can consume significantly
    more memory. Enabling ``metaslab_debug_unload`` consumes RAM that would otherwise
    be freed.
  range: 0=dynamically unload metaslab info, 1=unload metaslab info only upon
    pool export
  tags:
  - allocation
  - memory
  - metaslab
  when_to_change: When RAM is plentiful and the penalty for dynamically reloading
    metaslab info from the pool is high
metaslab_force_ganging:
  notes: When testing allocation code, ``metaslab_force_ganging`` forces blocks
    above the specified size to be ganged.
  range: SPA_MINBLOCKSIZE to (SPA_MAXBLOCKSIZE + 1)
  tags:
  - allocation
  when_to_change: for development testing purposes only
metaslab_fragmentation_factor_enabled:
  notes: Enable use of the fragmentation metric in computing metaslab weights.
    In version v0.7.0, if zfs_metaslab_segment_weight_enabled is enabled, then
    ``metaslab_fragmentation_factor_enabled`` is ignored.
  range: 0=do not consider metaslab free space fragmentation, 1=try to avoid fragmented
    metaslabs
  tags:
  - allocation
  - metaslab
  when_to_change: To test metaslab fragmentation
metaslab_lba_weighting_enabled:
  notes: Modern HDDs have uniform bit density and constant angular velocity. Therefore,
    the outer recording zones are faster (higher bandwidth) than the inner zones
    by the ratio of outer to inner track diameter. The difference in bandwidth
    can be 2:1, and is often available in the HDD detailed specifications or drive
    manual. For HDDs when ``metaslab_lba_weighting_enabled`` is true, write allocation
    preference is given to the metaslabs representing the outer recording zones.
    Thus the allocation to metaslabs prefers faster bandwidth over free space.
    If the devices are not rotational, yet misrepresent themselves to the OS as
    rotational, then disabling ``metaslab_lba_weighting_enabled`` can result in
    more even, free-space-based allocation.
  range: 0=do not use LBA weighting, 1=use LBA weighting
  tags:
  - HDD
  - SSD
  - allocation
  - metaslab
  verification: The rotational setting described by a block device in sysfs by
    observing ``/sys/ block/DISK_NAME/queue/rotational``
  when_to_change: disable if using only SSDs and version v0.6.4 or earlier
metaslab_preload_enabled:
  notes: Enable metaslab group preloading. Each top-level vdev has a metaslab
    group. By default, up to 3 copies of metadata can exist and are distributed
    across multiple top-level vdevs. ``metaslab_preload_enabled`` allows the corresponding
    metaslabs to be preloaded, thus improving allocation efficiency.
  range: 0=do not preload metaslab info, 1=preload up to 3 metaslabs
  tags:
  - allocation
  - metaslab
  when_to_change: When testing metaslab allocation
metaslabs_per_vdev:
  notes: When a vdev is added, it will be divided into approximately, but no more
    than, this number of metaslabs.
  range: 16 to UINT64_MAX
  tags:
  - allocation
  - metaslab
  - vdev
  when_to_change: When testing metaslab allocation
send_holes_without_birth_time:
  notes: Alias for ignore_hole_birth
spa_asize_inflation:
  notes: Multiplication factor used to estimate actual disk consumption from the
    size of data being written. The default value is a worst case estimate, but
    lower values may be valid for a given pool depending on its configuration.
    Pool administrators who understand the factors involved may wish to specify
    a more realistic inflation factor, particularly if they operate close to quota
    or capacity limits. The worst case space requirement for allocation is single-sector
    max-parity RAIDZ blocks, in which case the space requirement is exactly 4
    times the size, accounting for a maximum of 3 parity blocks. This is added
    to the maximum number of ZFS ``copies`` parameter (copies max=3). Additional
    space is required if the block could impact deduplication tables. Altogether,
    the worst case is 24. If the estimation is not correct, then quotas or out-of-space
    conditions can lead to optimistic expectations of the ability to allocate.
    Applications are typically not prepared to deal with such failures and can
    misbehave.
  range: 1 to 24
  tags:
  - SPA
  - allocation
  when_to_change: If the allocation requirements for the workload are well known
    and quotas are used
spa_config_path:
  notes: By default, the ``zpool import`` command searches for pool information
    in the ``zpool.cache`` file. If the pool to be imported has an entry in ``zpool.cache``
    then the devices do not have to be scanned to determine if they are pool members.
    The path to the cache file is spa_config_path. For more information on ``zpool
    import`` and the ``-o cachefile`` and ``-d`` options, see the man page for
    zpool(8) See also zfs_autoimport_disable
  tags:
  - import
  when_to_change: If creating a non-standard distribution and the cachefile property
    is inconvenient
spa_load_print_vdev_tree:
  notes: '``spa_load_print_vdev_tree`` enables printing of the attempted pool
    import''s vdev tree to kernel message to the ZFS debug message log ``/proc/spl/kstat/zfs/dbgmsg``
    Both the provided vdev tree and MOS vdev tree are printed, which can be useful
    for debugging problems with the zpool ``cachefile``'
  range: 0 = do not print pool configuration in logs, 1 = print pool configuration
    in logs
  tags:
  - SPA
  - import
  when_to_change: troubleshooting pool import failures
spa_load_verify_data:
  notes: An extreme rewind import (see ``zpool import -X``) normally performs
    a full traversal of all blocks in the pool for verification. If this parameter
    is set to 0, the traversal skips non-metadata blocks. It can be toggled once
    the import has started to stop or start the traversal of non-metadata blocks.
    See also spa_load_verify_metadata.
  range: 0=do not verify data upon pool import, 1=verify pool data upon import
  tags:
  - SPA
  - allocation
  when_to_change: At the risk of data integrity, to speed extreme import of large
    pool
spa_load_verify_maxinflight:
  notes: Maximum number of concurrent I/Os during the data verification performed
    during an extreme rewind import (see ``zpool import -X``)
  range: 1 to MAX_INT
  tags:
  - import
  when_to_change: During an extreme rewind import, to match the concurrent I/O
    capabilities of the pool devices
spa_load_verify_metadata:
  notes: An extreme rewind import (see ``zpool import -X``) normally performs
    a full traversal of all blocks in the pool for verification. If this parameter
    is set to 0, the traversal is not performed. It can be toggled once the import
    has started to stop or start the traversal. See spa_load_verify_data
  range: 0=do not verify metadata upon pool import, 1=verify pool metadata upon
    import
  tags:
  - import
  when_to_change: At the risk of data integrity, to speed extreme import of large
    pool
spa_load_verify_shift:
  notes: '``spa_load_verify_shift`` sets the fraction of ARC that can be used
    by inflight I/Os when verifying the pool during import. This value is a "shift"
    representing the fraction of ARC target size (``grep -w c /proc/spl/kstat/zfs/arcstats``).
    The ARC target size is shifted to the right. Thus a value of ''2'' results
    in the fraction = 1/4, while a value of ''4'' results in the fraction = 1/8.
    For large memory machines, pool import can consume large amounts of ARC: much
    larger than the value of maxinflight. This can result in spa_load_verify_maxinflight
    having a value of 0 causing the system to hang. Setting ``spa_load_verify_shift``
    can reduce this limit and allow importing without hanging.'
  range: 1 to MAX_INT
  tags:
  - ARC
  - SPA
  - import
  when_to_change: troubleshooting pool import on large memory machines
spa_slop_shift:
  notes: Normally, the last 3.2% (1/(2^\ ``spa_slop_shift``)) of pool space is
    reserved to ensure the pool doesn't run completely out of space, due to unaccounted
    changes (e.g. to the MOS). This also limits the worst-case time to allocate
    space. When less than this amount of free space exists, most ZPL operations
    (e.g. write, create) return error:no space (ENOSPC). Changing spa_slop_shift
    affects the currently loaded ZFS module and all imported pools. spa_slop_shift
    is not stored on disk. Beware when importing full pools on systems with larger
    spa_slop_shift can lead to over-full conditions. The minimum SPA slop space
    is limited to 128 MiB. The maximum SPA slop space is limited to 128 GiB.
  range: 1 to MAX_INT, however the practical upper limit is 15 for a system with
    4TB of RAM
  tags:
  - SPA
  - allocation
  when_to_change: For large pools, when 3.2% may be too conservative and more
    usable space is desired, consider increasing ``spa_slop_shift``
spl_hostid:
  notes: '| ``spl_hostid`` is a unique system id number. It originated in Sun''s
    products where most systems had a unique id assigned at the factory. This
    assignment does not exist in modern hardware. | In ZFS, the hostid is stored
    in the vdev label and can be used to determine if another system had imported
    the pool. When set ``spl_hostid`` can be used to uniquely identify a system.
    By default this value is set to zero which indicates the hostid is disabled.
    It can be explicitly enabled by placing a unique non-zero value in the file
    shown in spl_hostid_path'
  range: 0=ignore hostid, 1 to 4,294,967,295 (32-bits or 0xffffffff)
  tags:
  - MMP
  - hostid
  when_to_change: to uniquely identify a system when vdevs can be shared across
    multiple systems
spl_hostid_path:
  notes: '``spl_hostid_path`` is the path name for a file that can contain a unique
    hostid. For testing purposes, ``spl_hostid_path`` can be overridden by the
    ZFS_HOSTID environment variable.'
  tags:
  - MMP
  - hostid
  when_to_change: when creating a new ZFS distribution where the default value
    is inappropriate
spl_kmem_alloc_max:
  notes: Large ``kmem_alloc()`` allocations fail if they exceed KMALLOC_MAX_SIZE,
    as determined by the kernel source. Allocations which are marginally smaller
    than this limit may succeed but should still be avoided due to the expense
    of locating a contiguous range of free pages. Therefore, a maximum kmem size
    with reasonable safely margin of 4x is set. ``kmem_alloc()`` allocations larger
    than this maximum will quickly fail. ``vmem_alloc()`` allocations less than
    or equal to this value will use ``kmalloc()``, but shift to ``vmalloc()``
    when exceeding this value.
  range: TBD
  tags:
  - memory
  when_to_change: TBD
spl_kmem_alloc_warn:
  notes: As a general rule ``kmem_alloc()`` allocations should be small, preferably
    just a few pages since they must by physically contiguous. Therefore, a rate
    limited warning is printed to the console for any ``kmem_alloc()`` which exceeds
    the threshold ``spl_kmem_alloc_warn`` The default warning threshold is set
    to eight pages but capped at 32K to accommodate systems using large pages.
    This value was selected to be small enough to ensure the largest allocations
    are quickly noticed and fixed. But large enough to avoid logging any warnings
    when a allocation size is larger than optimal but not a serious concern. Since
    this value is tunable, developers are encouraged to set it lower when testing
    so any new largish allocations are quickly caught. These warnings may be disabled
    by setting the threshold to zero.
  range: 0=disable the warnings,
  tags:
  - memory
  when_to_change: developers are encouraged lower when testing so any new, large
    allocations are quickly caught
spl_kmem_cache_expire:
  notes: Cache expiration is part of default illumos cache behavior. The idea
    is that objects in magazines which have not been recently accessed should
    be returned to the slabs periodically. This is known as cache aging and when
    enabled objects will be typically returned after 15 seconds. On the other
    hand Linux slabs are designed to never move objects back to the slabs unless
    there is memory pressure. This is possible because under Linux the cache will
    be notified when memory is low and objects can be released. By default only
    the Linux method is enabled. It has been shown to improve responsiveness on
    low memory systems and not negatively impact the performance of systems with
    more memory. This policy may be changed by setting the ``spl_kmem_cache_expire``
    bit mask as follows, both policies may be enabled concurrently.
  range: 0x01 - Aging (illumos), 0x02 - Low memory (Linux)
  tags:
  - memory
  when_to_change: TBD
spl_kmem_cache_kmem_limit:
  notes: Depending on the size of a memory cache object it may be backed by ``kmalloc()``
    or ``vmalloc()`` memory. This is because the size of the required allocation
    greatly impacts the best way to allocate the memory. When objects are small
    and only a small number of memory pages need to be allocated, ideally just
    one, then ``kmalloc()`` is very efficient. However, allocating multiple pages
    with ``kmalloc()`` gets increasingly expensive because the pages must be physically
    contiguous. For this reason we shift to ``vmalloc()`` for slabs of large objects
    which which removes the need for contiguous pages. ``vmalloc()`` cannot be
    used in all cases because there is significant locking overhead involved.
    This function takes a single global lock over the entire virtual address range
    which serializes all allocations. Using slightly different allocation functions
    for small and large objects allows us to handle a wide range of object sizes.
    The ``spl_kmem_cache_kmem_limit`` value is used to determine this cutoff size.
    One quarter of the kernel's compiled PAGE_SIZE is used as the default value
    because spl_kmem_cache_obj_per_slab defaults to 16. With these default values,
    at most four contiguous pages are allocated.
  range: TBD
  tags:
  - memory
  when_to_change: TBD
spl_kmem_cache_kmem_threads:
  notes: '``spl_kmem_cache_kmem_threads`` shows the current number of ``spl_kmem_cache``
    threads. This task queue is responsible for allocating new slabs for use by
    the kmem caches. For the majority of systems and workloads only a small number
    of threads are required.'
  range: 1 to MAX_INT
  tags:
  - CPU
  - memory
  when_to_change: read-only
spl_kmem_cache_magazine_size:
  notes: '``spl_kmem_cache_magazine_size`` shows the current . Cache magazines
    are an optimization designed to minimize the cost of allocating memory. They
    do this by keeping a per-cpu cache of recently freed objects, which can then
    be reallocated without taking a lock. This can improve performance on highly
    contended caches. However, because objects in magazines will prevent otherwise
    empty slabs from being immediately released this may not be ideal for low
    memory machines. For this reason spl_kmem_cache_magazine_size can be used
    to set a maximum magazine size. When this value is set to 0 the magazine size
    will be automatically determined based on the object size. Otherwise magazines
    will be limited to 2-256 objects per magazine (eg per CPU). Magazines cannot
    be disabled entirely in this implementation.'
  range: 0=automatically scale magazine size, otherwise 2 to 256
  tags:
  - CPU
  - memory
spl_kmem_cache_max_size:
  notes: '``spl_kmem_cache_max_size`` is the maximum size of a kmem cache slab
    in MiB. This effectively limits the maximum cache object size to ``spl_kmem_cache_max_size``
    / spl_kmem_cache_obj_per_slab Kmem caches may not be created with object sized
    larger than this limit.'
  range: TBD
  tags:
  - memory
  when_to_change: TBD
spl_kmem_cache_obj_per_slab:
  notes: '``spl_kmem_cache_obj_per_slab`` is the preferred number of objects per
    slab in the kmem cache. In general, a larger value will increase the caches
    memory footprint while decreasing the time required to perform an allocation.
    Conversely, a smaller value will minimize the footprint and improve cache
    reclaim time but individual allocations may take longer.'
  range: TBD
  tags:
  - memory
  when_to_change: TBD
spl_kmem_cache_obj_per_slab_min:
  notes: '``spl_kmem_cache_obj_per_slab_min`` is the minimum number of objects
    allowed per slab. Normally slabs will contain spl_kmem_cache_obj_per_slab
    objects but for caches that contain very large objects it''s desirable to
    only have a few, or even just one, object per slab.'
  range: TBD
  tags:
  - memory
  when_to_change: debugging kmem cache operations
spl_kmem_cache_reclaim:
  notes: '``spl_kmem_cache_reclaim`` prevents Linux from being able to rapidly
    reclaim all the memory held by the kmem caches. This may be useful in circumstances
    where it''s preferable that Linux reclaim memory from some other subsystem
    first. Setting ``spl_kmem_cache_reclaim`` increases the likelihood out of
    memory events on a memory constrained system.'
  range: 0=enable rapid memory reclaim from kmem caches, 1=disable rapid memory
    reclaim from kmem caches
  tags:
  - memory
  when_to_change: TBD
spl_kmem_cache_slab_limit:
  notes: For small objects the Linux slab allocator should be used to make the
    most efficient use of the memory. However, large objects are not supported
    by the Linux slab allocator and therefore the SPL implementation is preferred.
    ``spl_kmem_cache_slab_limit`` is used to determine the cutoff between a small
    and large object. Objects of ``spl_kmem_cache_slab_limit`` or smaller will
    be allocated using the Linux slab allocator, large objects use the SPL allocator.
    A cutoff of 16 KiB was determined to be optimal for architectures using 4
    KiB pages.
  range: TBD
  tags:
  - memory
  when_to_change: TBD
spl_max_show_tasks:
  notes: '``spl_max_show_tasks`` is the limit of tasks per pending list in each
    taskq shown in ``/proc/spl/taskq`` and ``/proc/spl/taskq-all``. Reading the
    ProcFS files walks the lists with lock held and it could cause a lock up if
    the list grow too large. If the list is larger than the limit, the string
    \``"(truncated)" is printed.'
  range: 0 disables the limit, 1 to MAX_UINT
  tags:
  - taskq
  when_to_change: TBD
spl_panic_halt:
  notes: '``spl_panic_halt`` enables kernel panic upon assertion failures. When
    not enabled, the asserting thread is halted to facilitate further debugging.'
  range: 0=halt thread upon assertion, 1=panic kernel upon assertion
  tags:
  - debug
  - panic
  when_to_change: when debugging assertions and kernel core dumps are desired
spl_taskq_kick:
  notes: Upon writing a non-zero value to ``spl_taskq_kick``, all taskqs are scanned.
    If any taskq has a pending task more than 5 seconds old, the taskq spawns
    more threads. This can be useful in rare deadlock situations caused by one
    or more taskqs not spawning a thread when it should.
  tags:
  - taskq
  when_to_change: See description above
spl_taskq_thread_bind:
  notes: '``spl_taskq_thread_bind`` enables binding taskq threads to specific
    CPUs, distributed evenly over the available CPUs. By default, this behavior
    is disabled to allow the Linux scheduler the maximum flexibility to determine
    where a thread should run.'
  range: 0=taskqs are not bound to specific CPUs, 1=taskqs are bound to CPUs
  tags:
  - CPU
  - taskq
  when_to_change: when debugging CPU scheduling options
spl_taskq_thread_dynamic:
  notes: '``spl_taskq_thread_dynamic`` enables taskqs to set the TASKQ_DYNAMIC
    flag will by default create only a single thread. New threads will be created
    on demand up to a maximum allowed number to facilitate the completion of outstanding
    tasks. Threads which are no longer needed are promptly destroyed. By default
    this behavior is enabled but it can be d. See also zfs_zil_clean_taskq_nthr_pct,
    zio_taskq_batch_pct'
  range: 0=taskq threads are not dynamic, 1=taskq threads are dynamically created
    and destroyed
  tags:
  - taskq
  when_to_change: disable for performance analysis or troubleshooting
spl_taskq_thread_priority:
  notes: '| ``spl_taskq_thread_priority`` allows newly created taskq threads to
    set a non-default scheduler priority. When enabled the priority specified
    when a taskq is created will be applied to all threads created by that taskq.
    | When disabled all threads will use the default Linux kernel thread priority.'
  range: 0=taskq threads use the default Linux kernel thread priority, 1=
  tags:
  - CPU
  - taskq
  when_to_change: when troubleshooting CPU scheduling-related performance issues
spl_taskq_thread_sequential:
  notes: '``spl_taskq_thread_sequential`` is the number of items a taskq worker
    thread must handle without interruption before requesting a new worker thread
    be spawned. ``spl_taskq_thread_sequential`` controls how quickly taskqs ramp
    up the number of threads processing the queue. Because Linux thread creation
    and destruction are relatively inexpensive a small default value has been
    selected. Thus threads are created aggressively, which is typically desirable.
    Increasing this value results in a slower thread creation rate which may be
    preferable for some configurations.'
  range: 1 to MAX_INT
  tags:
  - CPU
  - taskq
  when_to_change: TBD
vdev_removal_max_span:
  notes: During top-level vdev removal, chunks of data are copied from the vdev
    which may include free space in order to trade bandwidth for IOPS. ``vdev_removal_max_span``
    sets the maximum span of free space included as unnecessary data in a chunk
    of copied data.
  range: 0 to MAX_INT
  tags:
  - vdev_removal
  when_to_change: TBD
vdev_validate_skip:
  notes: '``vdev_validate_skip`` disables label validation steps during pool import.
    Changing is not recommended unless you know what you are doing and are recovering
    a damaged label.'
  range: 0=validate labels during pool import, 1=do not validate vdev labels during
    pool import
  tags:
  - vdev
  when_to_change: do not change
zfetch_array_rd_sz:
  notes: If prefetching is enabled, do not prefetch blocks larger than ``zfetch_array_rd_sz``
    size.
  range: 0 to MAX_ULONG
  tags:
  - prefetch
  when_to_change: To allow prefetching when using large block sizes
zfetch_max_distance:
  notes: Limits the maximum number of bytes to prefetch per stream.
  range: 0 to UINT_MAX
  tags:
  - prefetch
  when_to_change: Consider increasing read workloads that use large blocks and
    exhibit high prefetch hit ratios
zfetch_max_streams:
  notes: Maximum number of prefetch streams per file. For version v0.7.0 and later,
    when prefetching small files the number of prefetch streams is automatically
    reduced below to prevent the streams from overlapping.
  range: 1 to MAX_UINT
  tags:
  - prefetch
  when_to_change: If the workload benefits from prefetching and has more than
    ``zfetch_max_streams`` concurrent reader threads
zfetch_min_sec_reap:
  notes: Prefetch streams that have been accessed in ``zfetch_min_sec_reap`` seconds
    are automatically stopped.
  range: 0 to MAX_UINT
  tags:
  - prefetch
  when_to_change: To test prefetch efficiency
zfs_abd_scatter_enabled:
  notes: '``zfs_abd_scatter_enabled`` controls the ARC Buffer Data (ABD) scatter/gather
    feature. When disabled, the legacy behaviour is selected using linear buffers.
    For linear buffers, all the data in the ABD is stored in one contiguous buffer
    in memory (from a ``zio_[data_]buf_*`` kmem cache). When enabled (default),
    the data in the ABD is split into equal-sized chunks (from the ``abd_chunk_cache``
    kmem_cache), with pointers to the chunks recorded in an array at the end of
    the ABD structure. This allows more efficient memory allocation for buffers,
    especially when large recordsizes are used.'
  range: 0=use linear allocation only, 1=allow scatter/gather
  tags:
  - ABD
  - memory
  verification: ABD statistics are observable in ``/proc/spl/kstat/zfs/abdstats``.
    Slab allocations are observable in ``/proc/slabinfo``
  when_to_change: Testing ABD
zfs_abd_scatter_max_order:
  notes: '``zfs_abd_scatter_max_order`` sets the maximum order for physical page
    allocation when ABD is enabled (see zfs_abd_scatter_enabled) See also Buddy
    Memory Allocation in the Linux kernel documentation.'
  range: 1 to 10 (upper limit is hardware-dependent)
  tags:
  - ABD
  - memory
  verification: ABD statistics are observable in ``/proc/spl/kstat/zfs/abdstats``
  when_to_change: Testing ABD features
zfs_abd_scatter_min_size:
  notes: '``zfs_abd_scatter_min_size`` changes the ARC buffer data (ABD) allocator''s
    threshold for using linear or page-based scatter buffers. Allocations smaller
    than ``zfs_abd_scatter_min_size`` use linear ABDs. Scatter ABD''s use at least
    one page each, so sub-page allocations waste some space when allocated as
    scatter allocations. For example, 2KB scatter allocation wastes half of each
    page. Using linear ABD''s for small allocations results in slabs containing
    many allocations. This can improve memory efficiency, at the expense of more
    work for ARC evictions attempting to free pages, because all the buffers on
    one slab need to be freed in order to free the slab and its underlying pages.
    Typically, 512B and 1KB kmem caches have 16 buffers per slab, so it''s possible
    for them to actually waste more memory than scatter allocations: - one page
    per buf = wasting 3/4 or 7/8 - one buf per slab = wasting 15/16 Spill blocks
    are typically 512B and are heavily used on systems running *selinux* with
    the default dnode size and the ``xattr=sa`` property set. By default, linear
    allocations for 512B and 1KB, and scatter allocations for larger (>= 1.5KB)
    allocation requests.'
  range: 0 to MAX_INT
  tags:
  - ARC
  when_to_change: debugging memory allocation, especially for large pages
zfs_admin_snapshot:
  notes: Allow the creation, removal, or renaming of entries in the ``.zfs/snapshot``
    subdirectory to cause the creation, destruction, or renaming of snapshots.
    When enabled this functionality works both locally and over NFS exports which
    have the "no_root_squash" option set.
  range: 0=do not allow snapshot manipulation via the filesystem, 1=allow snapshot
    manipulation via the filesystem
  tags:
  - filesystem
  - snapshot
  when_to_change: TBD
zfs_arc_average_blocksize:
  notes: The ARC's buffer hash table is sized based on the assumption of an average
    block size of ``zfs_arc_average_blocksize``. The default of 8 KiB uses approximately
    1 MiB of hash table per 1 GiB of physical memory with 8-byte pointers.
  range: 512 to 16,777,216
  tags:
  - ARC
  - memory
  when_to_change: For workloads where the known average blocksize is larger, increasing
    ``zfs_arc_average_blocksize`` can reduce memory usage
zfs_arc_dnode_limit:
  notes: When the number of bytes consumed by dnodes in the ARC exceeds ``zfs_arc_dnode_limit``
    bytes, demand for new metadata can take from the space consumed by dnodes.
    The default value 0, indicates that a percent which is based on zfs_arc_dnode_limit_percent
    of the ARC meta buffers that may be used for dnodes. ``zfs_arc_dnode_limit``
    is similar to zfs_arc_meta_prune which serves a similar purpose for metadata.
  range: 0 to MAX_UINT64
  tags:
  - ARC
  when_to_change: Consider increasing if ``arc_prune`` is using excessive system
    time and ``/proc/spl/kstat/zfs/arcstats`` shows ``arc_dnode_size`` is near
    or over ``arc_dnode_limit``
zfs_arc_dnode_limit_percent:
  notes: Percentage of ARC metadata space that can be used for dnodes. The value
    calculated for ``zfs_arc_dnode_limit_percent`` can be overridden by zfs_arc_dnode_limit.
  range: 0 to 100
  tags:
  - ARC
  when_to_change: Consider increasing if ``arc_prune`` is using excessive system
    time and ``/proc/spl/kstat/zfs/arcstats`` shows ``arc_dnode_size`` is near
    or over ``arc_dnode_limit``
zfs_arc_dnode_reduce_percent:
  notes: Percentage of ARC dnodes to try to evict in response to demand for non-metadata
    when the number of bytes consumed by dnodes exceeds zfs_arc_dnode_limit.
  range: 0 to 100
  tags:
  - ARC
  when_to_change: Testing dnode cache efficiency
zfs_arc_evict_batch_limit:
  notes: Number ARC headers to evict per sublist before proceeding to another
    sublist. This batch-style operation prevents entire sublists from being evicted
    at once but comes at a cost of additional unlocking and locking.
  range: 1 to INT_MAX
  tags:
  - ARC
  when_to_change: Testing ARC multilist features
zfs_arc_free_target:
  notes: '``zfs_arc_free_target`` is the desired number of free pages below which
    the ARC triggers reclaim. Initialized at boot to the kernel''s ``vm.v_free_target``
    value. This parameter is FreeBSD-specific and uses pages as its unit, unlike
    ``zfs_arc_sys_free`` which is measured in bytes.'
  range: 0 to UINT_MAX
  tags:
  - ARC
  - memory
  when_to_change: When the ARC is not releasing memory fast enough to keep up
    with other system demands
zfs_arc_grow_retry:
  notes: When the ARC is shrunk due to memory demand, do not retry growing the
    ARC for ``zfs_arc_grow_retry`` seconds. This operates as a damper to prevent
    oscillating grow/shrink cycles when there is memory pressure. If ``zfs_arc_grow_retry``
    = 0, the internal default of 5 seconds is used.
  range: 1 to MAX_INT
  tags:
  - ARC
  - memory
  when_to_change: TBD
zfs_arc_lotsfree_percent:
  notes: Throttle ARC memory consumption, effectively throttling I/O, when free
    system memory drops below this percentage of total system memory. Setting
    ``zfs_arc_lotsfree_percent`` to 0 disables the throttle. The arcstat_memory_throttle_count
    counter in ``/proc/spl/kstat/arcstats`` can indicate throttle activity.
  range: 0 to 100
  tags:
  - ARC
  - memory
  when_to_change: TBD
zfs_arc_max:
  notes: 'Maximum size of ARC in bytes. If set to 0 then the maximum size of ARC
    is determined by the amount of system memory installed: * **Linux** and **FreeBSD**:
    the larger of ``all_system_memory - 1GB`` and ``5/8 × all_system_memory``
    *prior to v2.3.0* * **Linux**: 1/2 of system memory * **FreeBSD**: the larger
    of ``all_system_memory - 1GB`` and ``5/8 × all_system_memory`` ``zfs_arc_max``
    can be changed dynamically with some caveats. It cannot be set back to 0 while
    running and reducing it below the current ARC size will not cause the ARC
    to shrink without memory pressure to induce shrinking.'
  range: 67,108,864 to RAM size in bytes
  tags:
  - ARC
  - memory
  verification: '``c`` column in ``arcstats.py`` or ``/proc/spl/kstat/zfs/arcstats``
    entry ``c_max``'
  when_to_change: Reduce if ARC competes too much with other applications, increase
    if ZFS is the primary application and can use more RAM
zfs_arc_meta_adjust_restarts:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. The number of restart
    passes to make while scanning the ARC attempting the free buffers in order
    to stay below the zfs_arc_meta_limit.'
  range: 0 to INT_MAX
  tags:
  - ARC
  when_to_change: Testing ARC metadata adjustment feature
zfs_arc_meta_balance:
  notes: '``zfs_arc_meta_balance`` controls how the ARC balances metadata and
    data caching. When evicted metadata is re-requested (a "ghost hit"), the ARC
    shifts its target to cache more metadata. This parameter scales the strength
    of that shift relative to data ghost hits. Higher values give more preference
    to metadata. The default of 500 means metadata ghost hits have 5x the effect
    of data ghost hits. A value of 100 weights them equally. This parameter replaced
    the manual metadata limit tunables (``zfs_arc_meta_limit``, ``zfs_arc_meta_min``,
    etc.) that were removed in v2.2.0.'
  range: 0 to UINT_MAX
  tags:
  - ARC
  when_to_change: When the ARC is not caching enough metadata (or too much) for
    your workload
zfs_arc_meta_limit:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. Sets the maximum
    allowed size metadata buffers in the ARC. When zfs_arc_meta_limit is reached
    metadata buffers are reclaimed, even if the overall ``c_max`` has not been
    reached. In version v0.7.0, with a default value = 0, ``zfs_arc_meta_limit_percent``
    is used to set ``arc_meta_limit``'
  range: 0 to ``c_max``
  tags:
  - ARC
  verification: '``/proc/spl/kstat/zfs/arcstats`` entry ``arc_meta_limit``'
  when_to_change: For workloads where the metadata to data ratio in the ARC can
    be changed to improve ARC hit rates
zfs_arc_meta_limit_percent:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. Sets the limit to
    ARC metadata, ``arc_meta_limit``, as a percentage of the maximum size target
    of the ARC, ``c_max`` Prior to version v0.7.0, the zfs_arc_meta_limit was
    used to set the limit as a fixed size. ``zfs_arc_meta_limit_percent`` provides
    a more convenient interface for setting the limit.'
  range: 0 to 100
  tags:
  - ARC
  verification: '``/proc/spl/kstat/zfs/arcstats`` entry ``arc_meta_limit``'
  when_to_change: For workloads where the metadata to data ratio in the ARC can
    be changed to improve ARC hit rates
zfs_arc_meta_min:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. The minimum allowed
    size in bytes that metadata buffers may consume in the ARC. This value defaults
    to 0 which disables a floor on the amount of the ARC devoted meta data. When
    evicting data from the ARC, if the ``metadata_size`` is less than ``arc_meta_min``
    then data is evicted instead of metadata.'
  range: 16,777,216 to ``c_max``
  tags:
  - ARC
  verification: '``/proc/spl/kstat/zfs/arcstats`` entry ``arc_meta_min``'
zfs_arc_meta_prune:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. ``zfs_arc_meta_prune``
    sets the number of dentries and znodes to be scanned looking for entries which
    can be dropped. This provides a mechanism to ensure the ARC can honor the
    ``arc_meta_limit and`` reclaim otherwise pinned ARC buffers. Pruning may be
    required when the ARC size drops to ``arc_meta_limit`` because dentries and
    znodes can pin buffers in the ARC. Increasing this value will cause to dentry
    and znode caches to be pruned more aggressively and the arc_prune thread becomes
    more active. Setting ``zfs_arc_meta_prune`` to 0 will disable pruning.'
  range: 0 to INT_MAX
  tags:
  - ARC
  when_to_change: TBD
zfs_arc_meta_strategy:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. Defines the strategy
    for ARC metadata eviction (meta reclaim strategy). A value of 0 (META_ONLY)
    will evict only the ARC metadata. A value of 1 (BALANCED) indicates that additional
    data may be evicted if required in order to evict the requested amount of
    metadata.'
  range: 0=evict metadata only, 1=also evict data buffers if they can free metadata
    buffers for eviction
  tags:
  - ARC
  when_to_change: Testing ARC metadata eviction
zfs_arc_min:
  notes: Minimum ARC size limit. When the ARC is asked to shrink, it will stop
    shrinking at ``c_min`` as tuned by ``zfs_arc_min``.
  range: 33,554,432 to ``c_max``
  tags:
  - ARC
  verification: '``/proc/spl/kstat/zfs/arcstats`` entry ``c_min``'
  when_to_change: If the primary focus of the system is ZFS, then increasing can
    ensure the ARC gets a minimum amount of RAM
zfs_arc_min_prefetch_lifespan:
  notes: '.. note:: Removed in v0.8.0 by commit d4a72f238 ("Sequential scrub and
    resilvers"). Prefetch lifetime logic was reworked as part of the sequential
    scan changes. Replaced by ``zfs_arc_min_prefetch_ms`` and ``zfs_arc_min_prescient_prefetch_ms``.
    ``arc_min_prefetch_lifespan`` is the minimum time for a prefetched block to
    remain in ARC before it is eligible for eviction.'
  range: 0 = use default value
  tags:
  - ARC
  when_to_change: TBD
zfs_arc_min_prefetch_ms:
  notes: Minimum time prefetched blocks are locked in the ARC. A value of 0 represents
    the default of 1 second. However, once changed, dynamically setting to 0 will
    not return to the default.
  range: 1 to INT_MAX
  tags:
  - ARC
  - prefetch
  when_to_change: TBD
zfs_arc_min_prescient_prefetch_ms:
  notes: Minimum time "prescient prefetched" blocks are locked in the ARC. These
    blocks are meant to be prefetched fairly aggressively ahead of the code that
    may use them. A value of 0 represents the default of 6 seconds. However, once
    changed, dynamically setting to 0 will not return to the default.
  range: 1 to INT_MAX
  tags:
  - ARC
  - prefetch
  when_to_change: TBD
zfs_arc_p_dampener_disable:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. When data is being
    added to the ghost lists, the MRU target size is adjusted. The amount of adjustment
    is based on the ratio of the MRU/MFU sizes. When enabled, the ratio is capped
    to 10, avoiding large adjustments.'
  range: 0=avoid large adjustments, 1=permit large adjustments
  tags:
  - ARC
  when_to_change: Testing ARC ghost list behaviour
zfs_arc_p_min_shift:
  notes: '.. note:: Removed in v2.2.0 by commit a8d83e2a ("More adaptive ARC eviction").
    Replaced by adaptive eviction with zfs_arc_meta_balance. arc_p_min_shift is
    used to shift of ARC target size (``/proc/spl/kstat/zfs/arcstats`` entry ``c``)
    for calculating both minimum and maximum most recently used (MRU) target size
    (``/proc/spl/kstat/zfs/arcstats`` entry ``p``) A value of 0 represents the
    default setting of ``arc_p_min_shift`` = 4. However, once changed, dynamically
    setting ``zfs_arc_p_min_shift`` to 0 will not return to the default.'
  range: 1 to INT_MAX
  tags:
  - ARC
  verification: Observe changes to ``/proc/spl/kstat/zfs/arcstats`` entry ``p``
  when_to_change: TBD
zfs_arc_pc_percent:
  notes: '``zfs_arc_pc_percent`` allows ZFS arc to play more nicely with the kernel''s
    LRU pagecache. It can guarantee that the arc size won''t collapse under scanning
    pressure on the pagecache, yet still allows arc to be reclaimed down to zfs_arc_min
    if necessary. This value is specified as percent of pagecache size (as measured
    by ``NR_FILE_PAGES``) where that percent may exceed 100. This only operates
    during memory pressure/reclaim.'
  range: 0 to 100
  tags:
  - ARC
  - memory
  when_to_change: When using file systems under memory shortfall, if the page
    scanner causes the ARC to shrink too fast, then adjusting ``zfs_arc_pc_percent``
    can reduce the shrink rate
zfs_arc_shrink_shift:
  notes: '``arc_shrink_shift`` is used to adjust the ARC target sizes when large
    reduction is required. The current ARC target size, ``c``, and MRU size ``p``
    can be reduced by by the current ``size >> arc_shrink_shift``. For the default
    value of 7, this reduces the target by approximately 0.8%. A value of 0 represents
    the default setting of arc_shrink_shift = 7. However, once changed, dynamically
    setting arc_shrink_shift to 0 will not return to the default.'
  range: 1 to INT_MAX
  tags:
  - ARC
  - memory
  when_to_change: During memory shortfall, reducing ``zfs_arc_shrink_shift`` increases
    the rate of ARC shrinkage
zfs_arc_sys_free:
  notes: '``zfs_arc_sys_free`` is the target number of bytes the ARC should leave
    as free memory on the system. Defaults to the larger of 1/64 of physical memory
    or 512K. Setting this option to a non-zero value will override the default.
    A value of 0 represents the default setting of larger of 1/64 of physical
    memory or 512 KiB. However, once changed, dynamically setting zfs_arc_sys_free
    to 0 will not return to the default.'
  range: 0 to ULONG_MAX
  tags:
  - ARC
  - memory
  when_to_change: Change if more free memory is desired as a margin against memory
    demand by applications
zfs_async_block_max_blocks:
  notes: '``zfs_async_block_max_blocks`` limits the number of blocks freed in
    a single transaction group commit. During deletes of large objects, such as
    snapshots, the number of freed blocks can cause the DMU to extend txg sync
    times well beyond zfs_txg_timeout. ``zfs_async_block_max_blocks`` is used
    to limit these effects.'
  range: 1 to MAX_ULONG
  tags:
  - DMU
  - delete
  when_to_change: TBD
zfs_autoimport_disable:
  notes: Disable reading zpool.cache file (see spa_config_path) when loading the
    zfs module.
  range: 0=read ``zpool.cache`` at module load, 1=do not read ``zpool.cache``
    at module load
  tags:
  - import
  when_to_change: Leave as default so that zfs behaves as other Linux kernel modules
zfs_checksum_events_per_second:
  notes: '``zfs_checksum_events_per_second`` is a rate limit for checksum events.
    Note that this should not be set below the ``zed`` thresholds (currently 10
    checksums over 10 sec) or else ``zed`` may not trigger any action.'
  range: '``zed`` threshold to MAX_UINT'
  tags:
  - vdev
  when_to_change: TBD
zfs_checksums_per_second:
  notes: '.. note:: Renamed to zfs_checksum_events_per_second in v0.8.0 (commit
    ad796b8a3). The ZFS Event Daemon (zed) processes events from ZFS. However,
    it can be overwhelmed by high rates of error reports which can be generated
    by failing, high-performance devices. ``zfs_checksums_per_second`` limits
    the rate of checksum events reported to zed. Note: do not set this value lower
    than the SERD limit for ``checksum`` in zed. By default, ``checksum_N`` =
    10 and ``checksum_T`` = 10 minutes, resulting in a practical lower limit of
    1.'
  range: 0 to UINT_MAX
  tags:
  - checksum
  - zed
  when_to_change: If processing checksum error events at a higher rate is desired
zfs_commit_timeout_pct:
  notes: '``zfs_commit_timeout_pct`` controls the amount of time that a log (ZIL)
    write block (lwb) remains "open" when it isn''t "full" and it has a thread
    waiting to commit to stable storage. The timeout is scaled based on a percentage
    of the last lwb latency to avoid significantly impacting the latency of each
    individual intent log transaction (itx).'
  range: 1 to 100
  tags:
  - ZIL
  when_to_change: TBD
zfs_compressed_arc_enabled:
  notes: When compression is enabled for a dataset, later reads of the data can
    store the blocks in ARC in their on-disk, compressed state. This can increase
    the effective size of the ARC, as counted in blocks, and thus improve the
    ARC hit ratio.
  range: 0=compressed ARC disabled (legacy behaviour), 1=compress ARC data
  tags:
  - ABD
  - compression
  verification: raw ARC statistics are observable in ``/proc/spl/kstat/zfs/arcstats``
    and ARC hit ratios can be observed using ``arcstat``
  when_to_change: Testing ARC compression feature
zfs_condense_indirect_commit_entry_delay_ms:
  notes: During vdev removal, the vdev indirection layer sleeps for ``zfs_condense_indirect_commit_entry_delay_ms``
    milliseconds during mapping generation. This parameter is used during automated
    testing of the ZFS code to improve test coverage.
  range: 0 to MAX_INT
  tags:
  - vdev_removal
  when_to_change: do not change
zfs_condense_indirect_vdevs_enable:
  notes: During vdev removal, condensing process is an attempt to save memory
    by removing obsolete mappings. ``zfs_condense_indirect_vdevs_enable`` enables
    condensing indirect vdev mappings. When set, ZFS attempts to condense indirect
    vdev mappings if the mapping uses more than zfs_condense_min_mapping_bytes
    bytes of memory and if the obsolete space map object uses more than zfs_condense_max_obsolete_bytes
    bytes on disk.
  range: 0 = do not save memory, 1 = save memory by condensing obsolete mapping
    after vdev removal
  tags:
  - vdev_removal
  when_to_change: TBD
zfs_condense_max_obsolete_bytes:
  notes: After vdev removal, ``zfs_condense_max_obsolete_bytes`` sets the limit
    for beginning the condensing process. Condensing begins if the obsolete space
    map takes up more than ``zfs_condense_max_obsolete_bytes`` of space on disk
    (logically). The default of 1 GiB is small enough relative to a typical pool
    that the space consumed by the obsolete space map is minimal. See also zfs_condense_indirect_vdevs_enable
  range: 0 to MAX_ULONG
  tags:
  - vdev_removal
  when_to_change: no not change
zfs_condense_min_mapping_bytes:
  notes: After vdev removal, ``zfs_condense_min_mapping_bytes`` is the lower limit
    for determining when to condense the in-memory obsolete space map. The condensing
    process will not continue unless a minimum of ``zfs_condense_min_mapping_bytes``
    of memory can be freed. See also zfs_condense_indirect_vdevs_enable
  range: 0 to MAX_ULONG
  tags:
  - vdev_removal
  when_to_change: do not change
zfs_dbgmsg_enable:
  notes: '| Internally ZFS keeps a small log to facilitate debugging. The contents
    of the log are in the ``/proc/spl/kstat/zfs/dbgmsg`` file. | Writing 0 to
    ``/proc/spl/kstat/zfs/dbgmsg`` file clears the log. See also zfs_dbgmsg_maxsize'
  range: 0=do not log debug messages, 1=log debug messages
  tags:
  - debug
  when_to_change: To view ZFS internal debug log
zfs_dbgmsg_maxsize:
  notes: The ``/proc/spl/kstat/zfs/dbgmsg`` file size limit is set by zfs_dbgmsg_maxsize.
    See also zfs_dbgmsg_enable
  range: 0 to INT_MAX
  tags:
  - debug
  when_to_change: TBD
zfs_dbuf_state_index:
  notes: The ``zfs_dbuf_state_index`` feature is currently unused. It is normally
    used for controlling values in the ``/proc/spl/kstat/zfs/dbufs`` file.
  range: TBD
  tags:
  - debug
  when_to_change: Do not change
zfs_ddt_data_is_special:
  notes: '``zfs_ddt_data_is_special`` enables the deduplication table (DDT) to
    reside on a special top-level vdev.'
  range: 0=do not use special vdevs to store DDT, 1=store DDT in special vdevs
  tags:
  - dedup
  - special_vdev
  when_to_change: when using a special top-level vdev and no dedup top-level vdev
    and it is desired to store the DDT in the main pool top-level vdevs
zfs_deadman_checktime_ms:
  notes: Once a pool sync operation has taken longer than zfs_deadman_synctime_ms
    milliseconds, continue to check for slow operations every zfs_deadman_checktime_ms
    milliseconds.
  range: 1 to ULONG_MAX
  tags:
  - debug
  when_to_change: When debugging slow I/O
zfs_deadman_enabled:
  notes: When a pool sync operation takes longer than zfs_deadman_synctime_ms
    milliseconds, a "slow spa_sync" message is logged to the debug log (see zfs_dbgmsg_enable).
    If ``zfs_deadman_enabled`` is set to 1, then all pending IO operations are
    also checked and if any haven't completed within zfs_deadman_synctime_ms milliseconds,
    a "SLOW IO" message is logged to the debug log and a "deadman" system event
    (see zpool events command) with the details of the hung IO is posted.
  range: 0=do not log slow I/O, 1=log slow I/O
  tags:
  - debug
  when_to_change: To disable logging of slow I/O
zfs_deadman_failmode:
  notes: 'zfs_deadman_failmode controls the behavior of the I/O deadman timer
    when it detects a "hung" I/O. Valid values are: - wait - Wait for the "hung"
    I/O (default) - continue - Attempt to recover from a "hung" I/O - panic -
    Panic the system'
  range: '*wait*, *continue*, or *panic*'
  tags:
  - debug
  when_to_change: In some cluster cases, panic can be appropriate
zfs_deadman_synctime_ms:
  notes: The I/O deadman timer expiration time has two meanings 1. determines
    when the ``spa_deadman()`` logic should fire, indicating the txg sync has
    not completed in a timely manner 2. determines if an I/O is considered "hung"
    In version v0.8.0, any I/O that has not completed in ``zfs_deadman_synctime_ms``
    is considered "hung" resulting in one of three behaviors controlled by the
    zfs_deadman_failmode parameter. ``zfs_deadman_synctime_ms`` takes effect if
    zfs_deadman_enabled = 1.
  range: 1 to ULONG_MAX
  tags:
  - debug
  when_to_change: When debugging slow I/O
zfs_deadman_ziotime_ms:
  notes: When an individual I/O takes longer than ``zfs_deadman_ziotime_ms`` milliseconds,
    then the operation is considered to be "hung". If zfs_deadman_enabled is set
    then the deadman behaviour is invoked as described by the zfs_deadman_failmode
    option.
  range: 1 to ULONG_MAX
  tags:
  - debug
  when_to_change: Testing ABD features
zfs_dedup_prefetch:
  notes: ZFS can prefetch deduplication table (DDT) entries. ``zfs_dedup_prefetch``
    allows DDT prefetches to be enabled.
  range: 0=do not prefetch, 1=prefetch dedup table entries
  tags:
  - memory
  - prefetch
  when_to_change: For systems with limited RAM using the dedup feature, disabling
    deduplication table prefetch can reduce memory pressure
zfs_delay_min_dirty_percent:
  notes: The ZFS write throttle begins to delay each transaction when the amount
    of dirty data reaches the threshold ``zfs_delay_min_dirty_percent`` of zfs_dirty_data_max.
    This value should be >= zfs_vdev_async_write_active_max_dirty_percent.
  range: 0 to 100
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_delay_scale:
  notes: '``zfs_delay_scale`` controls how quickly the ZFS write throttle transaction
    delay approaches infinity. Larger values cause longer delays for a given amount
    of dirty data. For the smoothest delay, this value should be about 1 billion
    divided by the maximum number of write operations per second the pool can
    sustain. The throttle will smoothly handle between 10x and 1/10th ``zfs_delay_scale``.
    Note: ``zfs_delay_scale`` \* zfs_dirty_data_max must be < 2^64.'
  range: 0 to ULONG_MAX
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_delays_per_second:
  notes: '.. note:: Renamed to zfs_slow_io_events_per_second in v0.8.0 (commit
    ad796b8a3). The ZFS Event Daemon (zed) processes events from ZFS. However,
    it can be overwhelmed by high rates of error reports which can be generated
    by failing, high-performance devices. ``zfs_delays_per_second`` limits the
    rate of delay events reported to zed.'
  range: 0 to UINT_MAX
  tags:
  - delay
  - zed
  when_to_change: If processing delay events at a higher rate is desired
zfs_delete_blocks:
  notes: '``zfs_delete_blocks`` defines a large file for the purposes of delete.
    Files containing more than ``zfs_delete_blocks`` will be deleted asynchronously
    while smaller files are deleted synchronously. Decreasing this value reduces
    the time spent in an ``unlink(2)`` system call at the expense of a longer
    delay before the freed space is available. The ``zfs_delete_blocks`` value
    is specified in blocks, not bytes. The size of blocks can vary and is ultimately
    limited by the filesystem''s recordsize property.'
  range: 1 to ULONG_MAX
  tags:
  - delete
  - filesystem
  when_to_change: If applications delete large files and blocking on ``unlink(2)``
    is not desired
zfs_dirty_data_max:
  notes: '``zfs_dirty_data_max`` is the ZFS write throttle dirty space limit.
    Once this limit is exceeded, new writes are delayed until space is freed by
    writes being committed to the pool. zfs_dirty_data_max takes precedence over
    zfs_dirty_data_max_percent.'
  range: 1 to zfs_dirty_data_max_max
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_dirty_data_max_max:
  notes: '``zfs_dirty_data_max_max`` is the maximum allowable value of zfs_dirty_data_max.
    ``zfs_dirty_data_max_max`` takes precedence over zfs_dirty_data_max_max_percent.'
  range: 1 to physical RAM size
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_dirty_data_max_max_percent:
  notes: '``zfs_dirty_data_max_max_percent`` an alternative to zfs_dirty_data_max_max
    for setting the maximum allowable value of zfs_dirty_data_max zfs_dirty_data_max_max
    takes precedence over ``zfs_dirty_data_max_max_percent``'
  range: 1 to 100
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_dirty_data_max_percent:
  notes: '``zfs_dirty_data_max_percent`` is an alternative method of specifying
    zfs_dirty_data_max, the ZFS write throttle dirty space limit. Once this limit
    is exceeded, new writes are delayed until space is freed by writes being committed
    to the pool. zfs_dirty_data_max takes precedence over ``zfs_dirty_data_max_percent``.'
  range: 1 to 100
  tags:
  - write_throttle
  when_to_change: See section "ZFS TRANSACTION DELAY"
zfs_dirty_data_sync:
  notes: When there is at least ``zfs_dirty_data_sync`` dirty data, a transaction
    group sync is started. This allows a transaction group sync to occur more
    frequently than the transaction group timeout interval (see zfs_txg_timeout)
    when there is dirty data to be written.
  range: 1 to ULONG_MAX
  tags:
  - ZIO_scheduler
  - write_throttle
  when_to_change: TBD
zfs_dirty_data_sync_percent:
  notes: When there is at least ``zfs_dirty_data_sync_percent`` of zfs_dirty_data_max
    dirty data, a transaction group sync is started. This allows a transaction
    group sync to occur more frequently than the transaction group timeout interval
    (see zfs_txg_timeout) when there is dirty data to be written.
  range: 1 to zfs_vdev_async_write_active_min_dirty_percent
  tags:
  - ZIO_scheduler
  - write_throttle
  when_to_change: TBD
zfs_disable_dup_eviction:
  notes: '.. note:: Removed in v0.7.0 by commit d3c2ae1c0 ("OpenZFS 6950 - ARC
    should cache compressed data"). Duplicate buffer handling was reworked as
    part of the compressed ARC changes. No replacement parameter. Disable duplicate
    buffer eviction from ARC.'
  range: 0=duplicate buffers can be evicted, 1=do not evict duplicate buffers
  tags:
  - ARC
  - dedup
  when_to_change: TBD
zfs_disable_ivset_guid_check:
  notes: '``zfs_disable_ivset_guid_check`` disables requirement for IVset guids
    to be present and match when doing a raw receive of encrypted datasets. Intended
    for users whose pools were created with ZFS on Linux pre-release versions
    and now have compatibility issues. For a ZFS raw receive, from a send stream
    created by ``zfs send --raw``, the crypt_keydata nvlist includes a to_ivset_guid
    to be set on the new snapshot. This value will override the value generated
    by the snapshot code. However, this value may not be present, because older
    implementations of the raw send code did not include this value. When ``zfs_disable_ivset_guid_check``
    is enabled, the receive proceeds and a newly-generated value is used.'
  range: 0=check IVset guid, 1=do not check IVset guid
  tags:
  - receive
  when_to_change: debugging pre-release ZFS raw sends
zfs_dmu_offset_next_sync:
  notes: '``zfs_dmu_offset_next_sync`` enables forcing txg sync to find holes.
    This causes ZFS to act like older versions when ``SEEK_HOLE`` or ``SEEK_DATA``
    flags are used: when a dirty dnode causes txgs to be synced so the previous
    data can be found.'
  range: 0=do not force txg sync to find holes, 1=force txg sync to find holes
  tags:
  - DMU
  when_to_change: to exchange strict hole reporting for performance
zfs_expire_snapshot:
  notes: Snapshots of filesystems are normally automounted under the filesystem's
    ``.zfs/snapshot`` subdirectory. When not in use, snapshots are unmounted after
    zfs_expire_snapshot seconds.
  range: 0 disables automatic unmounting, maximum time is INT_MAX
  tags:
  - filesystem
  - snapshot
  when_to_change: TBD
zfs_flags:
  notes: Set additional debugging flags (see zfs_dbgmsg_enable)
  tags:
  - debug
  when_to_change: When debugging ZFS
zfs_fletcher_4_impl:
  notes: Fletcher-4 is the default checksum algorithm for metadata and data. When
    the zfs kernel module is loaded, a set of microbenchmarks are run to determine
    the fastest algorithm for the current hardware. The ``zfs_fletcher_4_impl``
    parameter allows a specific implementation to be specified other than the
    default (fastest). Selectors other than *fastest* and *scalar* require instruction
    set extensions to be available and will only appear if ZFS detects their presence.
    The *scalar* implementation works on all processors. The results of the microbenchmark
    are visible in the ``/proc/spl/kstat/zfs/fletcher_4_bench`` file. Larger numbers
    indicate better performance. Since ZFS is processor endian-independent, the
    microbenchmark is run against both big and little-endian transformation.
  range: '*fastest*, *scalar*, *superscalar*, *superscalar4*, *sse2*, *ssse3*,
    *avx2*, *avx512f*, or *aarch64_neon* depending on hardware support'
  tags:
  - CPU
  - checksum
  when_to_change: Testing Fletcher-4 algorithms
zfs_free_bpobj_enabled:
  notes: The processing of the free_bpobj object can be enabled by ``zfs_free_bpobj_enabled``
  range: 0=do not process free_bpobj objects, 1=process free_bpobj objects
  tags:
  - delete
  when_to_change: If there's a problem with processing free_bpobj (e.g. i/o error
    or bug)
zfs_free_leak_on_eio:
  notes: 'If destroy encounters an I/O error (EIO) while reading metadata (eg
    indirect blocks), space referenced by the missing metadata cannot be freed.
    Normally, this causes the background destroy to become "stalled", as the destroy
    is unable to make forward progress. While in this stalled state, all remaining
    space to free from the error-encountering filesystem is temporarily leaked.
    Set ``zfs_free_leak_on_eio = 1`` to ignore the EIO, permanently leak the space
    from indirect blocks that can not be read, and continue to free everything
    else that it can. The default, stalling behavior is useful if the storage
    partially fails (eg some but not all I/Os fail), and then later recovers.
    In this case, we will be able to continue pool operations while it is partially
    failed, and when it recovers, we can continue to free the space, with no leaks.
    However, note that this case is rare. Typically pools either: 1. fail completely
    (but perhaps temporarily (eg a top-level vdev going offline) 2. have localized,
    permanent errors (eg disk returns the wrong data due to bit flip or firmware
    bug) In case (1), the ``zfs_free_leak_on_eio`` setting does not matter because
    the pool will be suspended and the sync thread will not be able to make forward
    progress. In case (2), because the error is permanent, the best effort do
    is leak the minimum amount of space. Therefore, it is reasonable for ``zfs_free_leak_on_eio``
    be set, but by default the more conservative approach is taken, so that there
    is no possibility of leaking space in the "partial temporary" failure case.'
  range: 0=normal behavior, 1=ignore error and permanently leak space
  tags:
  - debug
  when_to_change: When debugging I/O errors during destroy
zfs_free_max_blocks:
  notes: '``zfs_free_max_blocks`` sets the maximum number of blocks to be freed
    in a single transaction group (txg). For workloads that delete (free) large
    numbers of blocks in a short period of time, the processing of the frees can
    negatively impact other operations, including txg commits. ``zfs_free_max_blocks``
    acts as a limit to reduce the impact.'
  range: 1 to ULONG_MAX
  tags:
  - delete
  - filesystem
  when_to_change: For workloads that delete large files, ``zfs_free_max_blocks``
    can be adjusted to meet performance requirements while reducing the impacts
    of deletion
zfs_free_min_time_ms:
  notes: During a ``zfs destroy`` operation using ``feature@async_destroy`` a
    minimum of ``zfs_free_min_time_ms`` time will be spent working on freeing
    blocks per txg commit.
  range: 1 to (zfs_txg_timeout \* 1000)
  tags:
  - delete
  when_to_change: TBD
zfs_immediate_write_sz:
  notes: 'If a pool does not have a log device, data blocks equal to or larger
    than ``zfs_immediate_write_sz`` are treated as if the dataset being written
    to had the property setting ``logbias=throughput`` Terminology note: ``logbias=throughput``
    writes the blocks in "indirect mode" to the ZIL where the data is written
    to the pool and a pointer to the data is written to the ZIL.'
  range: 512 to 16,777,216 (valid block sizes)
  tags:
  - ZIL
  verification: Data blocks that exceed ``zfs_immediate_write_sz`` or are written
    as ``logbias=throughput`` increment the ``zil_itx_indirect_count`` entry in
    ``/proc/spl/kstat/zfs/zil``
  when_to_change: TBD
zfs_initialize_value:
  notes: When initializing a vdev, ZFS writes patterns of ``zfs_initialize_value``
    bytes to the device.
  tags:
  - vdev_initialize
  when_to_change: when debugging initialization code
zfs_key_max_salt_uses:
  notes: For encrypted datasets, the salt is regenerated every ``zfs_key_max_salt_uses``
    blocks. This automatic regeneration reduces the probability of collisions
    due to the Birthday problem. When set to the default (400,000,000) the probability
    of collision is approximately 1 in 1 trillion.
  range: 1 to ULONG_MAX
  tags:
  - encryption
  when_to_change: Testing encryption features
zfs_lua_max_instrlimit:
  notes: '``zfs_lua_max_instrlimit`` limits the maximum time for a ZFS channel
    program to run.'
  range: 0 to MAX_ULONG
  tags:
  - channel_programs
  when_to_change: to enforce a CPU usage limit on ZFS channel programs
zfs_lua_max_memlimit:
  notes: '''zfs_lua_max_memlimit'' is the maximum memory limit for a ZFS channel
    program.'
  range: 0 to MAX_ULONG
  tags:
  - channel_programs
zfs_max_dataset_nesting:
  notes: '``zfs_max_dataset_nesting`` limits the depth of nested datasets. Deeply
    nested datasets can overflow the stack. The maximum stack depth depends on
    kernel compilation options, so it is impractical to predict the possible limits.
    For kernels compiled with small stack sizes, ``zfs_max_dataset_nesting`` may
    require changes.'
  range: 0 to MAX_INT
  tags:
  - dataset
  when_to_change: can be tuned temporarily to fix existing datasets that exceed
    the predefined limit
zfs_max_missing_tvds:
  notes: 'When importing a pool in readonly mode (``zpool import -o readonly=on
    ...``) then up to ``zfs_max_missing_tvds`` top-level vdevs can be missing,
    but the import can attempt to progress. Note: This is strictly intended for
    advanced pool recovery cases since missing data is almost inevitable. Pools
    with missing devices can only be imported read-only for safety reasons, and
    the pool''s ``failmode`` property is automatically set to ``continue`` The
    expected use case is to recover pool data immediately after accidentally adding
    a non-protected vdev to a protected pool. - With 1 missing top-level vdev,
    ZFS should be able to import the pool and mount all datasets. User data that
    was not modified after the missing device has been added should be recoverable.
    Thus snapshots created prior to the addition of that device should be completely
    intact. - With 2 missing top-level vdevs, some datasets may fail to mount
    since there are dataset statistics that are stored as regular metadata. Some
    data might be recoverable if those vdevs were added recently. - With 3 or
    more top-level missing vdevs, the pool is severely damaged and MOS entries
    may be missing entirely. Chances of data recovery are very low. Note that
    there are also risks of performing an inadvertent rewind as we might be missing
    all the vdevs with the latest uberblocks.'
  range: 0 to MAX_INT
  tags:
  - import
  when_to_change: troubleshooting pools with missing devices
zfs_max_recordsize:
  notes: ZFS supports logical record (block) sizes from 512 bytes to 16 MiB. The
    benefits of larger blocks, and thus larger average I/O sizes, can be weighed
    against the cost of copy-on-write of large block to modify one byte. Additionally,
    very large blocks can have a negative impact on both I/O latency at the device
    level and the memory allocator. The ``zfs_max_recordsize`` parameter limits
    the upper bound of the dataset volblocksize and recordsize properties. Larger
    blocks can be created by enabling ``zpool`` ``large_blocks`` feature and changing
    this ``zfs_max_recordsize``. Pools with larger blocks can always be imported
    and used, regardless of the value of ``zfs_max_recordsize``. For 32-bit systems,
    ``zfs_max_recordsize`` also limits the size of kernel virtual memory caches
    used in the ZFS I/O pipeline (``zio_buf_*`` and ``zio_data_buf_*``). See also
    the ``zpool`` ``large_blocks`` feature.
  range: 512 to 16,777,216 (valid block sizes)
  tags:
  - filesystem
  - memory
  - volume
  when_to_change: To create datasets with larger volblocksize or recordsize
zfs_mdcomp_disable:
  notes: '``zfs_mdcomp_disable`` allows metadata compression to be disabled.'
  range: 0=compress metadata, 1=do not compress metadata
  tags:
  - CPU
  - metadata
  when_to_change: When CPU cycles cost less than I/O
zfs_metaslab_fragmentation_threshold:
  notes: Allow metaslabs to keep their active state as long as their fragmentation
    percentage is less than or equal to this value. When writing, an active metaslab
    whose fragmentation percentage exceeds ``zfs_metaslab_fragmentation_threshold``
    is avoided allowing metaslabs with less fragmentation to be preferred. Metaslab
    fragmentation is used to calculate the overall pool ``fragmentation`` property
    value. However, individual metaslab fragmentation levels are observable using
    the ``zdb`` with the ``-mm`` option. ``zfs_metaslab_fragmentation_threshold``
    works at the metaslab level and each top-level vdev has approximately metaslabs_per_vdev
    metaslabs. See also zfs_mg_fragmentation_threshold
  range: 1 to 100
  tags:
  - allocation
  - fragmentation
  - vdev
  when_to_change: Testing metaslab allocation
zfs_metaslab_segment_weight_enabled:
  notes: 'Enables metaslab allocation based on largest free segment rather than
    total amount of free space. The goal is to avoid metaslabs that exhibit free
    space fragmentation: when there is a lot of small free spaces, but few larger
    free spaces. If ``zfs_metaslab_segment_weight_enabled`` is enabled, then metaslab_fragmentation_factor_enabled
    is ignored.'
  range: 0=do not consider metaslab fragmentation, 1=avoid metaslabs where free
    space is highly fragmented
  tags:
  - allocation
  - metaslab
  when_to_change: When testing allocation and fragmentation
zfs_metaslab_switch_threshold:
  notes: When using segment-based metaslab selection (see zfs_metaslab_segment_weight_enabled),
    continue allocating from the active metaslab until ``zfs_metaslab_switch_threshold``
    worth of free space buckets have been exhausted.
  range: 0 to UINT64_MAX
  tags:
  - allocation
  - metaslab
  when_to_change: When testing allocation and fragmentation
zfs_mg_fragmentation_threshold:
  notes: Metaslab groups (top-level vdevs) are considered eligible for allocations
    if their fragmentation percentage metric is less than or equal to ``zfs_mg_fragmentation_threshold``.
    If a metaslab group exceeds this threshold then it will be skipped unless
    all metaslab groups within the metaslab class have also crossed the ``zfs_mg_fragmentation_threshold``
    threshold.
  range: 1 to 100
  tags:
  - allocation
  - fragmentation
  - vdev
  when_to_change: Testing metaslab allocation
zfs_mg_noalloc_threshold:
  notes: Metaslab groups (top-level vdevs) with free space percentage greater
    than ``zfs_mg_noalloc_threshold`` are eligible for new allocations. If a metaslab
    group's free space is less than or equal to the threshold, the allocator avoids
    allocating to that group unless all groups in the pool have reached the threshold.
    Once all metaslab groups have reached the threshold, all metaslab groups are
    allowed to accept allocations. The default value of 0 disables the feature
    and causes all metaslab groups to be eligible for allocations. This parameter
    allows one to deal with pools having heavily imbalanced vdevs such as would
    be the case when a new vdev has been added. Setting the threshold to a non-zero
    percentage will stop allocations from being made to vdevs that aren't filled
    to the specified percentage and allow lesser filled vdevs to acquire more
    allocations than they otherwise would under the older ``zfs_mg_alloc_failures``
    facility.
  range: 0 to 100
  tags:
  - allocation
  - fragmentation
  - vdev
  when_to_change: To force rebalancing as top-level vdevs are added or expanded
zfs_multihost_fail_intervals:
  notes: '``zfs_multihost_fail_intervals`` controls the behavior of the pool when
    write failures are detected in the multihost multimodifier protection (MMP)
    subsystem. If ``zfs_multihost_fail_intervals = 0`` then multihost write failures
    are ignored. The write failures are reported to the ZFS event daemon (``zed``)
    which can take action such as suspending the pool or offlining a device. |
    If ``zfs_multihost_fail_intervals > 0`` then sequential multihost write failures
    will cause the pool to be suspended. This occurs when (``zfs_multihost_fail_intervals``
    \* zfs_multihost_interval) milliseconds have passed since the last successful
    multihost write. | This guarantees the activity test will see multihost writes
    if the pool is attempted to be imported by another system.'
  range: 0 to UINT_MAX
  tags:
  - MMP
  - import
  when_to_change: TBD
zfs_multihost_history:
  notes: The pool ``multihost`` multimodifier protection (MMP) subsystem can record
    historical updates in the ``/proc/spl/kstat/zfs/POOL_NAME/multihost`` file
    for debugging purposes. The number of lines of history is determined by zfs_multihost_history.
  range: 0 to INT_MAX
  tags:
  - MMP
  - import
  when_to_change: When testing multihost feature
zfs_multihost_import_intervals:
  notes: '``zfs_multihost_import_intervals`` controls the duration of the activity
    test on pool import for the multihost multimodifier protection (MMP) subsystem.
    The activity test can be expected to take a minimum time of (``zfs_multihost_import_interval``\
    s \* zfs_multihost_interval \* ``random(25%)``) milliseconds. The random period
    of up to 25% improves simultaneous import detection. For example, if two hosts
    are rebooted at the same time and automatically attempt to import the pool,
    then is is highly probable that one host will win. Smaller values of ``zfs_multihost_import_intervals``
    reduces the import time but increases the risk of failing to detect an active
    pool. The total activity check time is never allowed to drop below one second.
    Note: the multihost protection feature applies to storage devices that can
    be shared between multiple systems.'
  range: 1 to UINT_MAX
  tags:
  - MMP
  - import
  when_to_change: TBD
zfs_multihost_interval:
  notes: '``zfs_multihost_interval`` controls the frequency of multihost writes
    performed by the pool multihost multimodifier protection (MMP) subsystem.
    The multihost write period is (``zfs_multihost_interval`` / number of leaf-vdevs)
    milliseconds. Thus on average a multihost write will be issued for each leaf
    vdev every ``zfs_multihost_interval`` milliseconds. In practice, the observed
    period can vary with the I/O load and this observed value is the delay which
    is stored in the uberblock. On import the multihost activity check waits a
    minimum amount of time determined by (``zfs_multihost_interval`` \* zfs_multihost_import_intervals)
    with a lower bound of 1 second. The activity check time may be further extended
    if the value of mmp delay found in the best uberblock indicates actual multihost
    updates happened at longer intervals than ``zfs_multihost_interval`` Note:
    the multihost protection feature applies to storage devices that can be shared
    between multiple systems.'
  range: 100 to ULONG_MAX
  tags:
  - MMP
  - import
  - vdev
  when_to_change: To optimize pool import time against possibility of simultaneous
    import by another system
zfs_multilist_num_sublists:
  notes: To allow more fine-grained locking, each ARC state contains a series
    of lists (sublists) for both data and metadata objects. Locking is performed
    at the sublist level. This parameters controls the number of sublists per
    ARC state, and also applies to other uses of the multilist data structure.
  range: 1 to INT_MAX
  tags:
  - ARC
  when_to_change: TBD
zfs_no_scrub_io:
  notes: When ``zfs_no_scrub_io = 1`` scrubs do not actually scrub data and simply
    doing a metadata crawl of the pool instead.
  range: 0=perform scrub I/O, 1=do not perform scrub I/O
  tags:
  - scrub
  when_to_change: Testing scrub feature
zfs_no_scrub_prefetch:
  notes: When ``zfs_no_scrub_prefetch = 1``, prefetch is disabled for scrub I/Os.
  range: 0=prefetch scrub I/Os, 1=do not prefetch scrub I/Os
  tags:
  - prefetch
  - scrub
  when_to_change: Testing scrub feature
zfs_nocacheflush:
  notes: ZFS uses barriers (volatile cache flush commands) to ensure data is committed
    to permanent media by devices. This ensures consistent on-media state for
    devices where caches are volatile (eg HDDs). For devices with nonvolatile
    caches, the cache flush operation can be a no-op. However, in some RAID arrays,
    cache flushes can cause the entire cache to be flushed to the backing devices.
    To ensure on-media consistency, keep cache flush enabled.
  range: 0=send cache flush commands, 1=do not send cache flush commands
  tags:
  - disks
  when_to_change: If the storage device has nonvolatile cache, then disabling
    cache flush can save the cost of occasional cache flush commands
zfs_nopwrite_enabled:
  notes: The NOP-write feature is enabled by default when a cryptographically-secure
    checksum algorithm is in use by the dataset. ``zfs_nopwrite_enabled`` allows
    the NOP-write feature to be completely disabled.
  range: 0=disable NOP-write feature, 1=enable NOP-write feature
  tags:
  - checksum
  - debug
  when_to_change: TBD
zfs_object_mutex_size:
  notes: '``zfs_object_mutex_size`` facilitates resizing the the per-dataset znode
    mutex array for testing deadlocks therein.'
  range: 1 to UINT_MAX
  tags:
  - debug
  when_to_change: Testing znode mutex array deadlocks
zfs_obsolete_min_time_ms:
  notes: '``zfs_obsolete_min_time_ms`` is similar to zfs_free_min_time_ms and
    used for cleanup of old indirection records for vdevs removed using the ``zpool
    remove`` command.'
  range: 0 to MAX_INT
  tags:
  - delete
  - remove
  when_to_change: TBD
zfs_override_estimate_recordsize:
  notes: '``zfs_override_estimate_recordsize`` overrides the default logic for
    estimating block sizes when doing a zfs send. The default heuristic is that
    the average block size will be the current recordsize.'
  range: 0=do not override, 1 to MAX_ULONG
  tags:
  - send
  when_to_change: if most data in your dataset is not of the current recordsize
    and you require accurate zfs send size estimates
zfs_pd_bytes_max:
  notes: '``zfs_pd_bytes_max`` limits the number of bytes prefetched during a
    pool traversal (eg ``zfs send`` or other data crawling operations). These
    prefetches are referred to as "prescient prefetches" and are always 100% hit
    rate. The traversal operations do not use the default data or metadata prefetcher.'
  range: 0 to INT32_MAX
  tags:
  - prefetch
  - send
  when_to_change: TBD
zfs_per_txg_dirty_frees_percent:
  notes: '``zfs_per_txg_dirty_frees_percent`` as a percentage of zfs_dirty_data_max
    controls the percentage of dirtied blocks from frees in one txg. After the
    threshold is crossed, additional dirty blocks from frees wait until the next
    txg. Thus, when deleting large files, filling consecutive txgs with deletes/frees,
    does not throttle other, perhaps more important, writes. A side effect of
    this throttle can impact ``zfs receive`` workloads that contain a large number
    of frees and the ignore_hole_birth optimization is disabled. The symptom is
    that the receive workload causes an increase in the frequency of txg commits.
    The frequency of txg commits is observable via the ``otime`` column of ``/proc/spl/kstat/zfs/POOLNAME/txgs``.
    Since txg commits also flush data from volatile caches in HDDs to media, HDD
    performance can be negatively impacted. Also, since the frees do not consume
    much bandwidth over the pipe, the pipe can appear to stall. Thus the overall
    progress of receives is slower than expected. A value of zero will disable
    this throttle.'
  range: 0 to 100
  tags:
  - delete
  when_to_change: For ``zfs receive`` workloads, consider increasing or disabling.
    See section ZFS I/O S cheduler
zfs_prefetch_disable:
  notes: '``zfs_prefetch_disable`` controls the predictive prefetcher. Note that
    it leaves "prescient" prefetch (eg prefetch for ``zfs send``) intact (see
    zfs_pd_bytes_max)'
  range: 0=prefetch enabled, 1=prefetch disabled
  tags:
  - prefetch
  verification: prefetch efficacy is observed by ``arcstat``, ``arc_summary``,
    and the relevant entries in ``/proc/spl/kstat/zfs/arcstats``
  when_to_change: In some case where the workload is completely random reads,
    overall performance can be better if prefetch is disabled
zfs_qat_checksum_disable:
  notes: '``zfs_qat_checksum_disable`` controls the Intel QuickAssist Technology
    (QAT) driver providing hardware acceleration for checksums. When the QAT hardware
    is present and qat driver available, the default behaviour is to enable QAT.'
  range: 0=use QAT acceleration if available, 1=do not use QAT acceleration
  tags:
  - QAT
  - checksum
  when_to_change: Testing QAT functionality
zfs_qat_compress_disable:
  notes: '``zfs_qat_compress_disable`` controls the Intel QuickAssist Technology
    (QAT) driver providing hardware acceleration for gzip compression. When the
    QAT hardware is present and qat driver available, the default behaviour is
    to enable QAT.'
  range: 0=use QAT acceleration if available, 1=do not use QAT acceleration
  tags:
  - QAT
  - compression
  when_to_change: Testing QAT functionality
zfs_qat_disable:
  notes: '``zfs_qat_disable`` controls the Intel QuickAssist Technology (QAT)
    driver providing hardware acceleration for gzip compression. When the QAT
    hardware is present and qat driver available, the default behaviour is to
    enable QAT.'
  range: 0=use QAT acceleration if available, 1=do not use QAT acceleration
  tags:
  - QAT
  - compression
  when_to_change: Testing QAT functionality
zfs_qat_encrypt_disable:
  notes: '``zfs_qat_encrypt_disable`` controls the Intel QuickAssist Technology
    (QAT) driver providing hardware acceleration for encryption. When the QAT
    hardware is present and qat driver available, the default behaviour is to
    enable QAT.'
  range: 0=use QAT acceleration if available, 1=do not use QAT acceleration
  tags:
  - QAT
  - encryption
  when_to_change: Testing QAT functionality
zfs_read_chunk_size:
  notes: '``zfs_read_chunk_size`` is the limit for ZFS filesystem reads. If an
    application issues a ``read()`` larger than ``zfs_read_chunk_size``, then
    the ``read()`` is divided into multiple operations no larger than ``zfs_read_chunk_size``'
  range: 512 to ULONG_MAX
  tags:
  - filesystem
  when_to_change: TBD
zfs_read_history:
  notes: Historical statistics for the last ``zfs_read_history`` reads are available
    in ``/proc/spl/kstat/zfs/POOL_NAME/reads``
  range: 0 to INT_MAX
  tags:
  - debug
  when_to_change: To observe read operation details
zfs_read_history_hits:
  notes: When zfs_read_history\ ``> 0``, zfs_read_history_hits controls whether
    ARC hits are displayed in the read history file, ``/proc/spl/kstat/zfs/POOL_NAME/reads``
  range: 0=do not include data for ARC hits, 1=include ARC hit data
  tags:
  - debug
  when_to_change: To observe read operation details with ARC hits
zfs_reconstruct_indirect_combinations_max:
  notes: After device removal, if an indirect split block contains more than ``zfs_reconstruct_indirect_combinations_max``
    many possible unique combinations when being reconstructed, it can be considered
    too computationally expensive to check them all. Instead, at most ``zfs_reconstruct_indirect_combinations_max``
    randomly-selected combinations are attempted each time the block is accessed.
    This allows all segment copies to participate fairly in the reconstruction
    when all combinations cannot be checked and prevents repeated use of one bad
    copy.
  range: 0=do not limit attempts, 1 to MAX_INT = limit for attempts
  tags:
  - vdev_removal
  when_to_change: TBD
zfs_recover:
  notes: '``zfs_recover`` can be set to true (1) to attempt to recover from otherwise-fatal
    errors, typically caused by on-disk corruption. When set, calls to ``zfs_panic_recover()``
    will turn into warning messages rather than calling ``panic()``'
  range: 0=normal operation, 1=attempt recovery zpool import
  tags:
  - import
  verification: check output of ``dmesg`` and other logs for details
  when_to_change: zfs_recover should only be used as a last resort, as it typically
    results in leaked space, or worse
zfs_recv_queue_length:
  notes: '``zfs_recv_queue_length`` is the maximum number of bytes allowed in
    the zfs receive queue.'
  range: Must be at least twice the maximum recordsize or volblocksize in use
  tags:
  - receive
  when_to_change: When using the largest recordsize or volblocksize (16 MiB),
    increasing can improve receive efficiency
zfs_removal_ignore_errors:
  notes: When removing a device, ``zfs_removal_ignore_errors`` controls the process
    for handling hard I/O errors. When set, if a device encounters a hard IO error
    during the removal process the removal will not be cancelled. This can result
    in a normally recoverable block becoming permanently damaged and is not recommended.
    This should only be used as a last resort when the pool cannot be returned
    to a healthy state prior to removing the device.
  range: 'during device removal: 0 = hard errors are not ignored, 1 = hard errors
    are ignored'
  tags:
  - vdev_removal
  when_to_change: See description for caveat
zfs_removal_suspend_progress:
  notes: '``zfs_removal_suspend_progress`` is used during automated testing of
    the ZFS code to incease test coverage.'
  range: 0 = do not suspend during vdev removal
  tags:
  - vdev_removal
  when_to_change: do not change
zfs_remove_max_segment:
  notes: '``zfs_remove_max_segment`` sets the largest contiguous segment that
    ZFS attempts to allocate when removing a vdev. This can be no larger than
    16MB. If there is a performance problem with attempting to allocate large
    blocks, consider decreasing this. The value is rounded up to a power-of-2.'
  range: maximum of the physical block size of all vdevs in the pool to 16,777,216
    bytes (16 MiB)
  tags:
  - remove
  when_to_change: after removing a top-level vdev, consider decreasing if there
    is a performance degradation when attempting to allocate large blocks
zfs_resilver_delay:
  notes: '``zfs_resilver_delay`` sets a time-based delay for resilver I/Os. This
    delay is in addition to the ZIO scheduler''s treatment of scrub workloads.
    See also zfs_scan_idle'
  range: 0 to MAX_INT
  tags:
  - ZIO_scheduler
  - resilver
  when_to_change: increasing can reduce impact of resilver workload on dynamic
    workloads
zfs_resilver_disable_defer:
  notes: '``zfs_resilver_disable_defer`` disables the ``resilver_defer`` pool
    feature. The ``resilver_defer`` feature allows ZFS to postpone new resilvers
    if an existing resilver is in progress.'
  range: 0=allow ``resilver_defer`` to postpone new resilver operations, 1=immediately
    restart resilver when needed
  tags:
  - resilver
  when_to_change: if resilver postponement is not desired due to overall resilver
    time constraints
zfs_resilver_min_time_ms:
  notes: Resilvers are processed by the sync thread in syncing context. While
    resilvering, ZFS spends at least ``zfs_resilver_min_time_ms`` time working
    on a resilver between txg commits. The zfs_txg_timeout tunable sets a nominal
    timeout value for the txg commits. By default, this timeout is 5 seconds and
    the ``zfs_resilver_min_time_ms`` is 3 seconds. However, many variables contribute
    to changing the actual txg times. The measured txg interval is observed as
    the ``otime`` column (in nanoseconds) in the ``/proc/spl/kstat/zfs/POOL_NAME/txgs``
    file. See also zfs_txg_timeout and zfs_scan_min_time_ms
  range: 1 to zfs_txg_timeout converted to milliseconds
  tags:
  - resilver
  when_to_change: In some resilvering cases, increasing ``zfs_resilver_min_time_ms``
    can result in faster completion
zfs_scan_checkpoint_intval:
  notes: To preserve progress across reboots the sequential scan algorithm periodically
    needs to stop metadata scanning and issue all the verifications I/Os to disk
    every ``zfs_scan_checkpoint_intval`` seconds.
  range: 1 to INT_MAX
  tags:
  - resilver
  - scrub
  when_to_change: TBD
zfs_scan_fill_weight:
  notes: This tunable affects how scrub and resilver I/O segments are ordered.
    A higher number indicates that we care more about how filled in a segment
    is, while a lower number indicates we care more about the size of the extent
    without considering the gaps within a segment.
  range: 0 to INT_MAX
  tags:
  - resilver
  - scrub
  when_to_change: Testing sequential scrub and resilver
zfs_scan_idle:
  notes: When a non-scan I/O has occurred in the past ``zfs_scan_idle`` clock
    ticks, then zfs_resilver_delay or zfs_scrub_delay are enabled.
  range: 0 to MAX_INT
  tags:
  - ZIO_scheduler
  - resilver
  - scrub
  when_to_change: as part of a resilver/scrub tuning effort
zfs_scan_ignore_errors:
  notes: '``zfs_scan_ignore_errors`` allows errors discovered during scrub or
    resilver to be ignored. This can be tuned as a workaround to remove the dirty
    time list (DTL) when completing a pool scan. It is intended to be used during
    pool repair or recovery to prevent resilvering when the pool is imported.'
  range: 0 = do not ignore errors, 1 = ignore errors during pool scrub or resilver
  tags:
  - resilver
  when_to_change: See description above
zfs_scan_issue_strategy:
  notes: '``zfs_scan_issue_strategy`` controls the order of data verification
    while scrubbing or resilvering. +-------+-------------------------------------------------------------+
    | value | description | +=======+=============================================================+
    | 0 | fs will use strategy 1 during normal verification and | | | strategy
    2 while taking a checkpoint | +-------+-------------------------------------------------------------+
    | 1 | data is verified as sequentially as possible, given the | | | amount
    of memory reserved for scrubbing (see | | | zfs_scan_mem_lim_fact). This |
    | | can improve scrub performance if the pool''s data is heavily | | | fragmented.
    | +-------+-------------------------------------------------------------+
    | 2 | the largest mostly-contiguous chunk of found data is | | | verified
    first. By deferring scrubbing of small segments, | | | we may later find adjacent
    data to coalesce and increase | | | the segment size. | +-------+-------------------------------------------------------------+'
  range: 0 to 2
  tags:
  - resilver
  - scrub
  when_to_change: TBD
zfs_scan_legacy:
  notes: Setting ``zfs_scan_legacy = 1`` enables the legacy scan and scrub behavior
    instead of the newer sequential behavior.
  range: '0=use new method: scrubs and resilvers will gather metadata in memory
    before issuing sequential I/O, 1=use legacy algorithm will be used where I/O
    is initiated as soon as it is discovered'
  tags:
  - resilver
  - scrub
  when_to_change: In some cases, the new scan mode can consumer more memory as
    it collects and sorts I/Os; using the legacy algorithm can be more memory
    efficient at the expense of HDD read efficiency
zfs_scan_max_ext_gap:
  notes: '``zfs_scan_max_ext_gap`` limits the largest gap in bytes between scrub
    and resilver I/Os that will still be considered sequential for sorting purposes.'
  range: 512 to ULONG_MAX
  tags:
  - resilver
  - scrub
  when_to_change: TBD
zfs_scan_mem_lim_fact:
  notes: '``zfs_scan_mem_lim_fact`` limits the maximum fraction of RAM used for
    I/O sorting by sequential scan algorithm. When the limit is reached scanning
    metadata is stopped and data verification I/O is started. Data verification
    I/O continues until the memory used by the sorting algorithm drops by zfs_scan_mem_lim_soft_fact
    Memory used by the sequential scan algorithm can be observed as the kmem sio_cache.
    This is visible from procfs as ``grep sio_cache /proc/slabinfo`` and can be
    monitored using slab-monitoring tools such as ``slabtop``'
  range: TBD
  tags:
  - memory
  - resilver
  - scrub
  when_to_change: TBD
zfs_scan_mem_lim_soft_fact:
  notes: '``zfs_scan_mem_lim_soft_fact`` sets the fraction of the hard limit,
    zfs_scan_mem_lim_fact, used to determined the RAM soft limit for I/O sorting
    by the sequential scan algorithm. After zfs_scan_mem_lim_fact has been reached,
    metadata scanning is stopped until the RAM usage drops by ``zfs_scan_mem_lim_soft_fact``'
  range: 1 to INT_MAX
  tags:
  - resilver
  - scrub
  when_to_change: TBD
zfs_scan_min_time_ms:
  notes: Scrubs are processed by the sync thread in syncing context. While scrubbing,
    ZFS spends at least ``zfs_scan_min_time_ms`` time working on a scrub between
    txg commits. See also zfs_txg_timeout and zfs_resilver_min_time_ms
  range: 1 to zfs_txg_timeout converted to milliseconds
  tags:
  - scrub
  when_to_change: In some scrub cases, increasing ``zfs_scan_min_time_ms`` can
    result in faster completion
zfs_scan_strict_mem_lim:
  notes: When scrubbing or resilvering, by default, ZFS checks to ensure it is
    not over the hard memory limit before each txg commit. If finer-grained control
    of this is needed ``zfs_scan_strict_mem_lim`` can be set to 1 to enable checking
    before scanning each block.
  range: 0=normal scan behaviour, 1=check hard memory limit strictly during scan
  tags:
  - memory
  - resilver
  - scrub
  when_to_change: Do not change
zfs_scan_suspend_progress:
  notes: '``zfs_scan_suspend_progress`` causes a scrub or resilver scan to freeze
    without actually pausing.'
  range: 0=do not freeze scans, 1=freeze scans
  tags:
  - resilver
  - scrub
  when_to_change: testing or debugging scan code
zfs_scan_vdev_limit:
  notes: '``zfs_scan_vdev_limit`` is the maximum amount of data that can be concurrently
    issued at once for scrubs and resilvers per leaf vdev. ``zfs_scan_vdev_limit``
    attempts to strike a balance between keeping the leaf vdev queues full of
    I/Os while not overflowing the queues causing high latency resulting in long
    txg sync times. While ``zfs_scan_vdev_limit`` represents a bandwidth limit,
    the existing I/O limit of zfs_vdev_scrub_max_active remains in effect, too.'
  range: 512 to ULONG_MAX
  tags:
  - resilver
  - scrub
  - vdev
  when_to_change: TBD
zfs_scrub_delay:
  notes: '``zfs_scrub_delay`` sets a time-based delay for scrub I/Os. This delay
    is in addition to the ZIO scheduler''s treatment of scrub workloads. See also
    zfs_scan_idle'
  range: 0 to MAX_INT
  tags:
  - ZIO_scheduler
  - scrub
  when_to_change: increasing can reduce impact of scrub workload on dynamic workloads
zfs_scrub_min_time_ms:
  notes: Scrubs are processed by the sync thread. While scrubbing at least ``zfs_scrub_min_time_ms``
    time is spent working on a scrub between txg syncs.
  range: 1 to (zfs_txg_timeout - 1)
  tags:
  - scrub
zfs_send_corrupt_data:
  notes: '``zfs_send_corrupt_data`` enables ``zfs send`` to send of corrupt data
    by ignoring read and checksum errors. The corrupted or unreadable blocks are
    replaced with the value ``0x2f5baddb10c`` (ZFS bad block)'
  range: 0=do not send corrupt data, 1=replace corrupt data with cookie
  tags:
  - send
  when_to_change: When data corruption exists and an attempt to recover at least
    some data via ``zfs send`` is needed
zfs_send_queue_length:
  notes: '``zfs_send_queue_length`` is the maximum number of bytes allowed in
    the zfs send queue.'
  range: Must be at least twice the maximum recordsize or volblocksize in use
  tags:
  - send
  when_to_change: When using the largest recordsize or volblocksize (16 MiB),
    increasing can improve send efficiency
zfs_send_unmodified_spill_blocks:
  notes: '``zfs_send_unmodified_spill_blocks`` enables sending of unmodified spill
    blocks in the send stream. Under certain circumstances, previous versions
    of ZFS could incorrectly remove the spill block from an existing object. Including
    unmodified copies of the spill blocks creates a backwards compatible stream
    which will recreate a spill block if it was incorrectly removed.'
  range: 0=do not send unmodified spill blocks, 1=send unmodified spill blocks
  tags:
  - send
  when_to_change: TBD
zfs_slow_io_events_per_second:
  notes: '``zfs_slow_io_events_per_second`` is a rate limit for slow I/O events.
    Note that this should not be set below the ``zed`` thresholds (currently 10
    checksums over 10 sec) or else ``zed`` may not trigger any action.'
  range: '``zed`` threshold to MAX_UINT'
  tags:
  - vdev
  when_to_change: TBD
zfs_spa_discard_memory_limit:
  notes: '``zfs_spa_discard_memory_limit`` sets the limit for maximum memory used
    for prefetching a pool''s checkpoint space map on each vdev while discarding
    a pool checkpoint.'
  range: 0 to MAX_INT
  tags:
  - checkpoint
  when_to_change: TBD
zfs_special_class_metadata_reserve_pct:
  notes: '``zfs_special_class_metadata_reserve_pct`` sets a threshold for space
    in special vdevs to be reserved exclusively for metadata. This prevents small
    data blocks from completely consuming a special vdev.'
  range: 0 to 100
  tags:
  - special_vdev
  when_to_change: TBD
zfs_sync_pass_deferred_free:
  notes: The SPA sync process is performed in multiple passes. Once the pass number
    reaches ``zfs_sync_pass_deferred_free``, frees are no long processed and must
    wait for the next SPA sync. The ``zfs_sync_pass_deferred_free`` value is expected
    to be removed as a tunable once the optimal value is determined during field
    testing. The ``zfs_sync_pass_deferred_free`` pass must be greater than 1 to
    ensure that regular blocks are not deferred.
  range: 1 to INT_MAX
  tags:
  - SPA
  when_to_change: Testing SPA sync process
zfs_sync_pass_dont_compress:
  notes: The SPA sync process is performed in multiple passes. Once the pass number
    reaches ``zfs_sync_pass_dont_compress``, data block compression is no longer
    processed and must wait for the next SPA sync. The ``zfs_sync_pass_dont_compress``
    value is expected to be removed as a tunable once the optimal value is determined
    during field testing.
  range: 1 to INT_MAX
  tags:
  - SPA
  when_to_change: Testing SPA sync process
zfs_sync_pass_rewrite:
  notes: The SPA sync process is performed in multiple passes. Once the pass number
    reaches ``zfs_sync_pass_rewrite``, blocks can be split into gang blocks. The
    ``zfs_sync_pass_rewrite`` value is expected to be removed as a tunable once
    the optimal value is determined during field testing.
  range: 1 to INT_MAX
  tags:
  - SPA
  when_to_change: Testing SPA sync process
zfs_sync_taskq_batch_pct:
  notes: '``zfs_sync_taskq_batch_pct`` controls the number of threads used by
    the DSL pool sync taskq, ``dp_sync_taskq``'
  range: 1 to 100
  tags:
  - SPA
  when_to_change: to adjust the number of ``dp_sync_taskq`` threads
zfs_top_maxinflight:
  notes: '``zfs_top_maxinflight`` is used to limit the maximum number of I/Os
    queued to top-level vdevs during scrub or resilver operations. The actual
    top-level vdev limit is calculated by multiplying the number of child vdevs
    by ``zfs_top_maxinflight`` This limit is an additional cap over and above
    the scan limits'
  range: 1 to MAX_INT
  tags:
  - ZIO_scheduler
  - resilver
  - scrub
  when_to_change: for modern ZFS versions, the ZIO scheduler limits usually take
    precedence
zfs_trim_extent_bytes_max:
  notes: '``zfs_trim_extent_bytes_max`` sets the maximum size of a trim (aka discard,
    scsi unmap) command. Ranges larger than ``zfs_trim_extent_bytes_max`` are
    split in to chunks no larger than ``zfs_trim_extent_bytes_max`` bytes prior
    to being issued to the device. Use ``zpool iostat -w`` to observe the latency
    of trim commands.'
  range: zfs_trim_extent_bytes_min to MAX_UINT
  tags:
  - trim
  when_to_change: if the device can efficiently handle larger trim requests
zfs_trim_extent_bytes_min:
  notes: '``zfs_trim_extent_bytes_min`` sets the minimum size of trim (aka discard,
    scsi unmap) commands. Trim ranges smaller than ``zfs_trim_extent_bytes_min``
    are skipped unless they''re part of a larger range which was broken in to
    chunks. Some devices have performance degradation during trim operations,
    so using a larger ``zfs_trim_extent_bytes_min`` can reduce the total amount
    of space trimmed. Use ``zpool iostat -w`` to observe the latency of trim commands.'
  range: 0=trim all unallocated space, otherwise minimum physical block size to
    MAX\_
  tags:
  - trim
  when_to_change: when trim is in use and device performance suffers from trimming
    small allocations
zfs_trim_metaslab_skip:
  notes: '| ``zfs_trim_metaslab_skip`` enables uninitialized metaslabs to be skipped
    during the trim (aka discard, scsi unmap) process. ``zfs_trim_metaslab_skip``
    can be useful for pools constructed from large thinly-provisioned devices
    where trim operations perform slowly. | As a pool ages an increasing fraction
    of the pool''s metaslabs are initialized, progressively degrading the usefulness
    of this option. This setting is stored when starting a manual trim and persists
    for the duration of the requested trim. Use ``zpool iostat -w`` to observe
    the latency of trim commands.'
  range: 0=do not skip uninitialized metaslabs during trim, 1=skip uninitialized
    metaslabs during trim
  tags:
  - trim
zfs_trim_queue_limit:
  notes: '``zfs_trim_queue_limit`` sets the maximum queue depth for leaf vdevs.
    See also zfs_vdev_trim_max_active and zfs_trim_extent_bytes_max Use ``zpool
    iostat -q`` to observe trim queue depth.'
  range: 1 to MAX_UINT
  tags:
  - trim
  when_to_change: to restrict the number of trim commands in the queue
zfs_trim_txg_batch:
  notes: '``zfs_trim_txg_batch`` sets the number of transaction groups worth of
    frees which should be aggregated before trim (aka discard, scsi unmap) commands
    are issued to a device. This setting represents a trade-off between issuing
    larger, more efficient trim commands and the delay before the recently trimmed
    space is available for use by the device. Increasing this value will allow
    frees to be aggregated for a longer time. This will result is larger trim
    operations and potentially increased memory usage. Decreasing this value will
    have the opposite effect. The default value of 32 was empirically determined
    to be a reasonable compromise.'
  range: 1 to MAX_UINT
  tags:
  - trim
  when_to_change: TBD
zfs_txg_history:
  notes: Historical statistics for the last ``zfs_txg_history`` txg commits are
    available in ``/proc/spl/kstat/zfs/POOL_NAME/txgs`` The work required to measure
    the txg commit (SPA statistics) is low. However, for debugging purposes, it
    can be useful to observe the SPA statistics.
  range: 0 to INT_MAX
  tags:
  - debug
  when_to_change: To observe details of SPA sync behavior.
zfs_txg_timeout:
  notes: The open txg is committed to the pool periodically (SPA sync) and ``zfs_txg_timeout``
    represents the default target upper limit. txg commits can occur more frequently
    and a rapid rate of txg commits often indicates a busy write workload, quota
    limits reached, or the free space is critically low. Many variables contribute
    to changing the actual txg times. txg commits can also take longer than ``zfs_txg_timeout``
    if the ZFS write throttle is not properly tuned or the time to sync is otherwise
    delayed (eg slow device). Shorter txg commit intervals can occur due to zfs_dirty_data_sync
    for write-intensive workloads. The measured txg interval is observed as the
    ``otime`` column (in nanoseconds) in the ``/proc/spl/kstat/zfs/POOL_NAME/txgs``
    file. See also zfs_dirty_data_sync and zfs_txg_history
  range: 1 to INT_MAX
  tags:
  - SPA
  - ZIO_scheduler
  when_to_change: To optimize the work done by txg commit relative to the pool
    requirements. See also section ZFS I/O Scheduler
zfs_unlink_suspend_progress:
  notes: '``zfs_unlink_suspend_progress`` changes the policy for removing pending
    unlinks. When enabled, files will not be asynchronously removed from the list
    of pending unlinks and the space they consume will be leaked. Once this option
    has been disabled and the dataset is remounted, the pending unlinks will be
    processed and the freed space returned to the pool.'
  range: 0 = use async unlink removal, 1 = do not async unlink thus leaking space
  when_to_change: used by the ZFS test suite (ZTS) to facilitate testing
zfs_user_indirect_is_special:
  notes: If special vdevs are in use, ``zfs_user_indirect_is_special`` enables
    user data indirect blocks (a form of metadata) to be written to the special
    vdevs.
  range: 0=do not write user indirect blocks to a special vdev, 1=write user indirect
    blocks to a special vdev
  tags:
  - special_vdev
  when_to_change: to force user data indirect blocks to remain in the main pool
    top-level vdevs
zfs_vdev_aggregate_trim:
  notes: '``zfs_vdev_aggregate_trim`` allows trim I/Os to be aggregated. This
    is normally not helpful because the extents to be trimmed will have been already
    been aggregated by the metaslab.'
  range: 0=do not attempt to aggregate trim commands, 1=attempt to aggregate trim
    commands
  tags:
  - ZIO_scheduler
  - trim
  - vdev
  when_to_change: when debugging trim code or trim performance issues
zfs_vdev_aggregation_limit:
  notes: To reduce IOPs, small, adjacent I/Os can be aggregated (coalesced) into
    a large I/O. For reads, aggregations occur across small adjacency gaps. For
    writes, aggregation can occur at the ZFS or disk level. ``zfs_vdev_aggregation_limit``
    is the upper bound on the size of the larger, aggregated I/O. Setting ``zfs_vdev_aggregation_limit
    = 0`` effectively disables aggregation by ZFS. However, the block device scheduler
    can still merge (aggregate) I/Os. Also, many devices, such as modern HDDs,
    contain schedulers that can aggregate I/Os. In general, I/O aggregation can
    improve performance for devices, such as HDDs, where ordering I/O operations
    for contiguous LBAs is a benefit. For random access devices, such as SSDs,
    aggregation might not improve performance relative to the CPU cycles needed
    to aggregate. For devices that represent themselves as having no rotation,
    the zfs_vdev_aggregation_limit_non_rotating parameter is used instead of ``zfs_vdev_aggregation_limit``
  range: 0 to 1,048,576 (default) or 16,777,216 (if ``zpool`` ``large_blocks``
    feature is enabled)
  tags:
  - ZIO_scheduler
  - vdev
  verification: ZFS aggregation is observed with ``zpool iostat -r`` and the block
    scheduler merging is observed with ``iostat -x``
  when_to_change: If the workload does not benefit from aggregation, the ``zfs_vdev_aggregation_limit``
    can be reduced to avoid aggregation attempts
zfs_vdev_aggregation_limit_non_rotating:
  notes: '``zfs_vdev_aggregation_limit_non_rotating`` is the equivalent of zfs_vdev_aggregation_limit
    for devices which represent themselves as non-rotating to the Linux blkdev
    interfaces. Such devices have a value of 0 in ``/sys/block/DEVICE/queue/rotational``
    and are expected to be SSDs.'
  range: 0 to MAX_INT
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: see zfs_vdev_aggregation_limit
zfs_vdev_async_read_max_active:
  notes: Maximum asynchronous read I/Os active to each device.
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_async_read_min_active:
  notes: Minimum asynchronous read I/Os active to each device.
  range: 1 to ( zfs_vdev_async_read_max_active - 1)
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_async_write_active_max_dirty_percent:
  notes: When the amount of dirty data exceeds the threshold ``zfs_vdev_async_write_active_max_dirty_percent``
    of zfs_dirty_data_max dirty data, then zfs_vdev_async_write_max_active is
    used to limit active async writes. If the dirty data is between zfs_vdev_async_write_active_min_dirty_percent
    and ``zfs_vdev_async_write_active_max_dirty_percent``, the active I/O limit
    is linearly interpolated between zfs_vdev_async_write_min_active and zfs_vdev_async_write_max_active
  range: 0 to 100
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Sch eduler
zfs_vdev_async_write_active_min_dirty_percent:
  notes: If the amount of dirty data is between ``zfs_vdev_async_write_active_min_dirty_percent``
    and zfs_vdev_async_write_active_max_dirty_percent of zfs_dirty_data_max, the
    active I/O limit is linearly interpolated between zfs_vdev_async_write_min_active
    and zfs_vdev_async_write_max_active
  range: 0 to (zfs_vdev_async_write_active_max_dirty_percent - 1)
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Sch eduler
zfs_vdev_async_write_max_active:
  notes: '``zfs_vdev_async_write_max_active`` sets the maximum asynchronous write
    I/Os active to each device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O S cheduler
zfs_vdev_async_write_min_active:
  notes: '``zfs_vdev_async_write_min_active`` sets the minimum asynchronous write
    I/Os active to each device. Lower values are associated with better latency
    on rotational media but poorer resilver performance. The default value of
    2 was chosen as a compromise. A value of 3 has been shown to improve resilver
    performance further at a cost of further increasing latency.'
  range: 1 to zfs_vdev_async_write_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O S cheduler
zfs_vdev_cache_bshift:
  notes: 'Note: with the current ZFS code, the vdev cache is not helpful and in
    some cases actually harmful. Thus it is disabled by setting the zfs_vdev_cache_size
    to zero. This related tunable is, by default, inoperative. All read I/Os smaller
    than zfs_vdev_cache_max are turned into (``1 << zfs_vdev_cache_bshift``) byte
    reads by the vdev cache. At most zfs_vdev_cache_size bytes will be kept in
    each vdev''s cache.'
  range: 1 to INT_MAX
  tags:
  - vdev
  - vdev_cache
  when_to_change: Do not change
zfs_vdev_cache_max:
  notes: 'Note: with the current ZFS code, the vdev cache is not helpful and in
    some cases actually harmful. Thus it is disabled by setting the zfs_vdev_cache_size
    to zero. This related tunable is, by default, inoperative. All read I/Os smaller
    than zfs_vdev_cache_max will be turned into (``1 <<``\ zfs_vdev_cache_bshift
    byte reads by the vdev cache. At most ``zfs_vdev_cache_size`` bytes will be
    kept in each vdev''s cache.'
  range: 512 to INT_MAX
  tags:
  - vdev
  - vdev_cache
  when_to_change: Do not change
zfs_vdev_cache_size:
  notes: 'Note: with the current ZFS code, the vdev cache is not helpful and in
    some cases actually harmful. Thusit is disabled by setting the ``zfs_vdev_cache_size
    = 0`` ``zfs_vdev_cache_size`` is the size of the vdev cache.'
  range: 0 to MAX_INT
  tags:
  - vdev
  - vdev_cache
  verification: vdev cache statistics are available in the ``/proc/spl/kstat/zfs/vdev_cache_stats``
    file
  when_to_change: Do not change
zfs_vdev_default_ms_count:
  notes: When adding a top-level vdev, ``zfs_vdev_default_ms_count`` is the target
    number of metaslabs.
  range: 16 to MAX_INT
  tags:
  - allocation
  when_to_change: for development testing purposes only
zfs_vdev_initializing_max_active:
  notes: '``zfs_vdev_initializing_max_active`` sets the maximum initializing I/Os
    active to each device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Sch eduler
zfs_vdev_initializing_min_active:
  notes: '``zfs_vdev_initializing_min_active`` sets the minimum initializing I/Os
    active to each device.'
  range: 1 to zfs_vdev_initializing_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Sch eduler
zfs_vdev_max_active:
  notes: The maximum number of I/Os active to each device. Ideally, ``zfs_vdev_max_active``
    >= the sum of each queue's max_active. Once queued to the device, the ZFS
    I/O scheduler is no longer able to prioritize I/O operations. The underlying
    device drivers have their own scheduler and queue depth limits. Values larger
    than the device's maximum queue depth can have the affect of increased latency
    as the I/Os are queued in the intervening device driver layers.
  range: sum of each queue's min_active to UINT32_MAX
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_min_ms_count:
  notes: '``zfs_vdev_min_ms_count`` is the minimum number of metaslabs to create
    in a top-level vdev.'
  range: 16 to zfs_vdev_ms_count_limit
  tags:
  - metaslab
  - vdev
  when_to_change: TBD
zfs_vdev_mirror_non_rotating_inc:
  notes: The mirror read algorithm uses current load and an incremental weighting
    value to determine the vdev to service a read operation. Lower values determine
    the preferred vdev. The weighting value is zfs_vdev_mirror_rotating_inc for
    rotating media and ``zfs_vdev_mirror_non_rotating_inc`` for nonrotating media.
    Verify the rotational setting described by a block device in sysfs by observing
    ``/sys/block/DISK_NAME/queue/rotational``
  range: 0 to INT_MAX
  tags:
  - SSD
  - mirror
  - vdev
  when_to_change: TBD
zfs_vdev_mirror_non_rotating_seek_inc:
  notes: For nonrotating media in a mirror, a seek penalty is applied as sequential
    I/O's can be aggregated into fewer operations, avoiding unnecessary per-command
    overhead, often boosting performance. Verify the rotational setting described
    by a block device in SysFS by observing ``/sys/block/DISK_NAME/queue/rotational``
  range: 0 to INT_MAX
  tags:
  - SSD
  - mirror
  - vdev
  when_to_change: TBD
zfs_vdev_mirror_rotating_inc:
  notes: The mirror read algorithm uses current load and an incremental weighting
    value to determine the vdev to service a read operation. Lower values determine
    the preferred vdev. The weighting value is ``zfs_vdev_mirror_rotating_inc``
    for rotating media and zfs_vdev_mirror_non_rotating_inc for nonrotating media.
    Verify the rotational setting described by a block device in sysfs by observing
    ``/sys/block/DISK_NAME/queue/rotational``
  range: 0 to MAX_INT
  tags:
  - HDD
  - mirror
  - vdev
  when_to_change: Increasing for mirrors with both rotating and nonrotating media
    more strongly favors the nonrotating media
zfs_vdev_mirror_rotating_seek_inc:
  notes: For rotating media in a mirror, if the next I/O offset is within zfs_vdev_mirror_rotating_seek_offset
    then the weighting factor is incremented by (``zfs_vdev_mirror_rotating_seek_inc
    / 2``). Otherwise the weighting factor is increased by ``zfs_vdev_mirror_rotating_seek_inc``.
    This algorithm prefers rotating media with lower seek distance. Verify the
    rotational setting described by a block device in sysfs by observing ``/sys/block/DISK_NAME/queue/rotational``
  range: 0 to INT_MAX
  tags:
  - HDD
  - mirror
  - vdev
  when_to_change: TBD
zfs_vdev_mirror_rotating_seek_offset:
  notes: For rotating media in a mirror, if the next I/O offset is within ``zfs_vdev_mirror_rotating_seek_offset``
    then the weighting factor is incremented by (zfs_vdev_mirror_rotating_seek_inc\
    ``/ 2``). Otherwise the weighting factor is increased by ``zfs_vdev_mirror_rotating_seek_inc``.
    This algorithm prefers rotating media with lower seek distance. Verify the
    rotational setting described by a block device in sysfs by observing ``/sys/block/DISK_NAME/queue/rotational``
  range: 0 to INT_MAX
  tags:
  - HDD
  - mirror
  - vdev
  when_to_change: TBD
zfs_vdev_ms_count_limit:
  notes: '``zfs_vdev_ms_count_limit`` is the practical upper limit for the number
    of metaslabs per top-level vdev.'
  range: zfs_vdev_min_ms_count to 131,072
  tags:
  - metaslab
  - vdev
  when_to_change: TBD
zfs_vdev_nia_credit:
  notes: Some HDDs tend to prioritize sequential I/O so strongly, that concurrent
    random I/O latency reaches several seconds. On some HDDs this happens even
    if sequential I/O operations are submitted one at a time, and so setting zfs_*_max_active=
    1 does not help. To prevent non-interactive I/O, like scrub, from monopolizing
    the device, no more than zfs_vdev_nia_credit operations can be sent while
    there are outstanding incomplete interactive operations. This enforced wait
    ensures the HDD services the interactive I/O within a reasonable amount of
    time. See ZIO SCHEDULER.
  range: 1 to UINT_MAX
  tags:
  - resilver
  - scrub
  - vdev
  when_to_change: See ZIO SCHEDULER
zfs_vdev_nia_delay:
  notes: For non-interactive I/O (scrub, resilver, removal, initialize and rebuild),
    the number of concurrently-active I/O operations is limited to zfs_*_min_active,
    unless the vdev is "idle". When there are no interactive I/O operations active
    (synchronous or otherwise), and zfs_vdev_nia_delay operations have completed
    since the last interactive operation, then the vdev is considered to be "idle",
    and the number of concurrently-active non-interactive operations is increased
    to zfs_*_max_active. See ZIO SCHEDULER.
  range: 1 to UINT_MAX
  tags:
  - resilver
  - scrub
  - vdev
  when_to_change: See ZIO SCHEDULER
zfs_vdev_queue_depth_pct:
  notes: Maximum number of queued allocations per top-level vdev expressed as
    a percentage of zfs_vdev_async_write_max_active. This allows the system to
    detect devices that are more capable of handling allocations and to allocate
    more blocks to those devices. It also allows for dynamic allocation distribution
    when devices are imbalanced as fuller devices will tend to be slower than
    empty devices. Once the queue depth reaches (``zfs_vdev_queue_depth_pct``
    \* zfs_vdev_async_write_max_active / 100) then allocator will stop allocating
    blocks on that top-level device and switch to the next. See also zio_dva_throttle_enabled
  range: 1 to UINT32_MAX
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_raidz_impl:
  notes: '``zfs_vdev_raidz_impl`` overrides the raidz parity algorithm. By default,
    the algorithm is selected at zfs module load time by the results of a microbenchmark
    of algorithms based on the current hardware. Once the module is loaded, the
    content of ``/sys/module/zfs/parameters/zfs_vdev_raidz_impl`` shows available
    options with the currently selected enclosed in ``[]``. Details of the results
    of the microbenchmark are observable in the ``/proc/spl/kstat/zfs/vdev_raidz_bench``
    file. +----------------+----------------------+-------------------------+
    | algorithm | architecture | description | +================+======================+=========================+
    | fastest | all | fastest implementation | | | | selected by | | | | microbenchmark
    | +----------------+----------------------+-------------------------+ | original
    | all | original raidz | | | | implementation | +----------------+----------------------+-------------------------+
    | scalar | all | scalar raidz | | | | implementation | +----------------+----------------------+-------------------------+
    | sse2 | 64-bit x86 | uses SSE2 instruction | | | | set | +----------------+----------------------+-------------------------+
    | ssse3 | 64-bit x86 | uses SSSE3 instruction | | | | set | +----------------+----------------------+-------------------------+
    | avx2 | 64-bit x86 | uses AVX2 instruction | | | | set | +----------------+----------------------+-------------------------+
    | avx512f | 64-bit x86 | uses AVX512F | | | | instruction set | +----------------+----------------------+-------------------------+
    | avx512bw | 64-bit x86 | uses AVX512F & AVX512BW | | | | instruction sets
    | +----------------+----------------------+-------------------------+ | aarch64_neon
    | aarch64/64 bit ARMv8 | uses NEON | +----------------+----------------------+-------------------------+
    | aarch64_neonx2 | aarch64/64 bit ARMv8 | uses NEON with more | | | | unrolling
    | +----------------+----------------------+-------------------------+'
  range: see table above
  tags:
  - CPU
  - raidz
  - vdev
  when_to_change: testing raidz algorithms
zfs_vdev_read_gap_limit:
  notes: To reduce IOPs, small, adjacent I/Os are aggregated (coalesced) into
    into a large I/O. For reads, aggregations occur across small adjacency gaps
    where the gap is less than ``zfs_vdev_read_gap_limit``
  range: 0 to INT_MAX
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: TBD
zfs_vdev_removal_max_active:
  notes: '``zfs_vdev_removal_max_active`` sets the maximum top-level vdev removal
    I/Os active to each device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_removal_min_active:
  notes: '``zfs_vdev_removal_min_active`` sets the minimum top-level vdev removal
    I/Os active to each device.'
  range: 1 to zfs_vdev_removal_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_scheduler:
  notes: 'Prior to version 0.8.3, when the pool is imported, for whole disk vdevs,
    the block device I/O scheduler is set to ``zfs_vdev_scheduler``. The most
    common schedulers are: *noop*, *cfq*, *bfq*, and *deadline*. In some cases,
    the scheduler is not changeable using this method. Known schedulers that cannot
    be changed are: *scsi_mq* and *none*. In these cases, the scheduler is unchanged
    and an error message can be reported to logs. The parameter was disabled in
    v0.8.3 but left in place to avoid breaking loading of the ``zfs`` module if
    the parameter is specified in modprobe configuration on existing installations.
    It is recommended that users leave the default scheduler "unless you''re encountering
    a specific problem, or have clearly measured a performance improvement for
    your workload," and if so, to change it via the ``/sys/block/<device>/queue/scheduler``
    interface and/or udev rule.'
  range: 'expected: *noop*, *cfq*, *bfq*, and *deadline*'
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: since ZFS has its own I/O scheduler, using a simple scheduler
    can result in more consistent performance
zfs_vdev_scrub_max_active:
  notes: '``zfs_vdev_scrub_max_active`` sets the maximum scrub or scan read I/Os
    active to each device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - resilver
  - scrub
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_scrub_min_active:
  notes: '``zfs_vdev_scrub_min_active`` sets the minimum scrub or scan read I/Os
    active to each device.'
  range: 1 to zfs_vdev_scrub_max_active
  tags:
  - ZIO_scheduler
  - resilver
  - scrub
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_sync_read_max_active:
  notes: Maximum synchronous read I/Os active to each device.
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_sync_read_min_active:
  notes: '``zfs_vdev_sync_read_min_active`` sets the minimum synchronous read
    I/Os active to each device.'
  range: 1 to zfs_vdev_sync_read_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_sync_write_max_active:
  notes: '``zfs_vdev_sync_write_max_active`` sets the maximum synchronous write
    I/Os active to each device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_sync_write_min_active:
  notes: '``zfs_vdev_sync_write_min_active`` sets the minimum synchronous write
    I/Os active to each device.'
  range: 1 to zfs_vdev_sync_write_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_trim_max_active:
  notes: '``zfs_vdev_trim_max_active`` sets the maximum trim I/Os active to each
    device.'
  range: 1 to zfs_vdev_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_trim_min_active:
  notes: '``zfs_vdev_trim_min_active`` sets the minimum trim I/Os active to each
    device.'
  range: 1 to zfs_vdev_trim_max_active
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: See ZFS I/O Scheduler
zfs_vdev_write_gap_limit:
  notes: To reduce IOPs, small, adjacent I/Os are aggregated (coalesced) into
    into a large I/O. For writes, aggregations occur across small adjacency gaps
    where the gap is less than ``zfs_vdev_write_gap_limit``
  range: 0 to INT_MAX
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: TBD
zfs_zevent_cols:
  notes: '``zfs_zevent_cols`` is a soft wrap limit in columns (characters) for
    ZFS events logged to the console.'
  range: 1 to INT_MAX
  tags:
  - debug
  when_to_change: if 80 columns isn't enough
zfs_zevent_console:
  notes: If ``zfs_zevent_console`` is true (1), then ZFS events are logged to
    the console. More logging and log filtering capabilities are provided by ``zed``
  range: 0=do not log to console, 1=log to console
  tags:
  - debug
  when_to_change: to log ZFS events to the console
zfs_zevent_len_max:
  notes: '``zfs_zevent_len_max`` is the maximum ZFS event queue length. A value
    of 0 results in a calculated value (16 \* number of CPUs) with a minimum of
    64. Events in the queue can be viewed with the ``zpool events`` command.'
  range: 0 to INT_MAX
  tags:
  - debug
  when_to_change: increase to see more ZFS events
zfs_zil_clean_taskq_maxalloc:
  notes: During a SPA sync, intent log transaction groups (itxg) are cleaned.
    The cleaning work is dispatched to the DSL pool ZIL clean taskq (``dp_zil_clean_taskq``).
    zfs_zil_clean_taskq_minalloc is the minimum and ``zfs_zil_clean_taskq_maxalloc``
    is the maximum number of cached taskq entries for ``dp_zil_clean_taskq``.
    The actual number of taskq entries dynamically varies between these values.
    When ``zfs_zil_clean_taskq_maxalloc`` is exceeded transaction records (itxs)
    are cleaned synchronously with possible negative impact to the performance
    of SPA sync. Ideally taskq entries are pre-allocated prior to being needed
    by ``zil_clean()``, thus avoiding dynamic allocation of new taskq entries.
  range: zfs_zil_clean_taskq_minalloc to ``INT_MAX``
  tags:
  - ZIL
  when_to_change: If more ``dp_zil_clean_taskq`` entries are needed to prevent
    the itxs from being synchronously cleaned
zfs_zil_clean_taskq_minalloc:
  notes: During a SPA sync, intent log transaction groups (itxg) are cleaned.
    The cleaning work is dispatched to the DSL pool ZIL clean taskq (``dp_zil_clean_taskq``).
    ``zfs_zil_clean_taskq_minalloc`` is the minimum and zfs_zil_clean_taskq_maxalloc
    is the maximum number of cached taskq entries for ``dp_zil_clean_taskq``.
    The actual number of taskq entries dynamically varies between these values.
    ``zfs_zil_clean_taskq_minalloc`` is the minimum number of ZIL transaction
    records (itxs). Ideally taskq entries are pre-allocated prior to being needed
    by ``zil_clean()``, thus avoiding dynamic allocation of new taskq entries.
  range: 1 to zfs_zil_clean_taskq_maxalloc
  tags:
  - ZIL
  when_to_change: TBD
zfs_zil_clean_taskq_nthr_pct:
  notes: '``zfs_zil_clean_taskq_nthr_pct`` controls the number of threads used
    by the DSL pool ZIL clean taskq (``dp_zil_clean_taskq``). The default value
    of 100% will create a maximum of one thread per cpu.'
  range: 1 to 100
  tags:
  - ZIL
  - taskq
  when_to_change: Testing ZIL clean and SPA sync performance
zil_nocacheflush:
  notes: 'ZFS uses barriers (volatile cache flush commands) to ensure data is
    committed to permanent media by devices. This ensures consistent on-media
    state for devices where caches are volatile (eg HDDs). ``zil_nocacheflush``
    disables the cache flush commands that are normally sent to devices by the
    ZIL after a log write has completed. The difference between ``zil_nocacheflush``
    and zfs_nocacheflush is ``zil_nocacheflush`` applies to ZIL writes while zfs_nocacheflush
    disables barrier writes to the pool devices at the end of transaction group
    syncs. WARNING: setting this can cause ZIL corruption on power loss if the
    device has a volatile write cache.'
  range: 0=send cache flush commands, 1=do not send cache flush commands
  tags:
  - ZIL
  - disks
  when_to_change: If the storage device has nonvolatile cache, then disabling
    cache flush can save the cost of occasional cache flush commands
zil_replay_disable:
  notes: If ``zil_replay_disable = 1``, then when a volume or filesystem is brought
    online, no attempt to replay the ZIL is made and any existing ZIL is destroyed.
    This can result in loss of data without notice.
  range: 0=replay ZIL, 1=destroy ZIL
  tags:
  - ZIL
  - debug
  when_to_change: Do not change
zil_slog_bulk:
  notes: '``zil_slog_bulk`` is the log device write size limit per commit executed
    with synchronous priority. Writes below ``zil_slog_bulk`` are executed with
    synchronous priority. Writes above ``zil_slog_bulk`` are executed with lower
    (asynchronous) priority to reduct potential log device abuse by a single active
    ZIL writer.'
  range: 0 to ULONG_MAX
  tags:
  - ZIL
  when_to_change: See ZFS I/O Scheduler
zio_deadman_log_all:
  notes: '``zio_deadman_log_all`` enables debugging messages for all ZFS I/Os,
    rather than only for leaf ZFS I/Os for a vdev. This is meant to be used by
    developers to gain diagnostic information for hang conditions which don''t
    involve a mutex or other locking primitive. Typically these are conditions
    where a thread in the zio pipeline is looping indefinitely. See also zfs_dbgmsg_enable'
  range: 0=do not log all deadman events, 1=log all deadman events
  tags:
  - debug
  when_to_change: when debugging ZFS I/O pipeline
zio_delay_max:
  notes: If a ZFS I/O operation takes more than ``zio_delay_max`` milliseconds
    to complete, then an event is logged. Note that this is only a logging facility,
    not a timeout on operations. See also ``zpool events``
  range: 1 to INT_MAX
  tags:
  - debug
  when_to_change: when debugging slow I/O
zio_dva_throttle_enabled:
  notes: '``zio_dva_throttle_enabled`` controls throttling of block allocations
    in the ZFS I/O (ZIO) pipeline. When enabled, the maximum number of pending
    allocations per top-level vdev is limited by zfs_vdev_queue_depth_pct'
  range: 0=do not throttle ZIO block allocations, 1=throttle ZIO block allocations
  tags:
  - ZIO_scheduler
  - vdev
  when_to_change: Testing ZIO block allocation algorithms
zio_requeue_io_start_cut_in_line:
  notes: '``zio_requeue_io_start_cut_in_line`` controls prioritization of a re-queued
    ZFS I/O (ZIO) in the ZIO pipeline by the ZIO taskq.'
  range: 0=don't prioritize re-queued I/Os, 1=prioritize re-queued I/Os
  tags:
  - ZIO_scheduler
  when_to_change: Do not change
zio_slow_io_ms:
  notes: An I/O operation taking more than ``zio_slow_io_ms`` milliseconds to
    complete is marked as a slow I/O. Slow I/O counters can be observed with ``zpool
    status -s``. Each slow I/O causes a delay zevent, observable using ``zpool
    events``. See also ``zfs-events(5)``.
  range: 0 to MAX_INT
  tags:
  - vdev
  - zed
  when_to_change: when debugging slow devices and the default value is inappropriate
zio_taskq_batch_pct:
  notes: '``zio_taskq_batch_pct`` sets the number of I/O worker threads as a percentage
    of online CPUs. These workers threads are responsible for IO work such as
    compression and checksum calculations. Each block is handled by one worker
    thread, so maximum overall worker thread throughput is function of the number
    of concurrent blocks being processed, the number of worker threads, and the
    algorithms used. The default value of 75% is chosen to avoid using all CPUs
    which can result in latency issues and inconsistent application performance,
    especially when high compression is enabled. The taskq batch processes are:'
  range: 1 to 100, fractional number of CPUs are rounded down
  tags:
  - ZIO_scheduler
  - taskq
  verification: The number of taskqs for each batch group can be observed using
    ``ps`` and counting the threads
  when_to_change: To tune parallelism in multiprocessor systems
zvol_inhibit_dev:
  notes: '``zvol_inhibit_dev`` controls the creation of volume device nodes upon
    pool import.'
  range: 0=create volume device nodes, 1=do not create volume device nodes
  tags:
  - import
  - volume
  when_to_change: Inhibiting can slightly improve startup time on systems with
    a very large number of volumes
zvol_major:
  notes: '``zvol_major`` is the default major number for volume devices.'
  tags:
  - volume
  when_to_change: Do not change
zvol_max_discard_blocks:
  notes: Discard (aka ATA TRIM or SCSI UNMAP) operations done on volumes are done
    in batches ``zvol_max_discard_blocks`` blocks. The block size is determined
    by the ``volblocksize`` property of a volume. Some applications, such as ``mkfs``,
    discard the whole volume at once using the maximum possible discard size.
    As a result, many gigabytes of discard requests are not uncommon. Unfortunately,
    if a large amount of data is already allocated in the volume, ZFS can be quite
    slow to process discard requests. This is especially true if the volblocksize
    is small (eg default=8KB). As a result, very large discard requests can take
    a very long time (perhaps minutes under heavy load) to complete. This can
    cause a number of problems, most notably if the volume is accessed remotely
    (eg via iSCSI), in which case the client has a high probability of timing
    out on the request. Limiting the ``zvol_max_discard_blocks`` can decrease
    the amount of discard workload request by setting the ``discard_max_bytes``
    and ``discard_max_hw_bytes`` for the volume's block device in SysFS. This
    value is readable by volume device consumers.
  range: 0 to ULONG_MAX
  tags:
  - discard
  - volume
  verification: Observe value of ``/sys/block/ VOLUME_INSTANCE/queue/discard_max_bytes``
  when_to_change: if volume discard activity severely impacts other workloads
zvol_prefetch_bytes:
  notes: When importing a pool with volumes or adding a volume to a pool, ``zvol_prefetch_bytes``
    are prefetch from the start and end of the volume. Prefetching these regions
    of the volume is desirable because they are likely to be accessed immediately
    by ``blkid(8)`` or by the kernel scanning for a partition table.
  range: 0 to UINT_MAX
  tags:
  - prefetch
  - volume
  when_to_change: TBD
zvol_request_sync:
  notes: When processing I/O requests for a volume submit them synchronously.
    This effectively limits the queue depth to 1 for each I/O submitter. When
    set to 0 requests are handled asynchronously by the "zvol" thread pool. See
    also zvol_threads
  range: 0=do concurrent (async) volume requests, 1=do sync volume requests
  tags:
  - volume
  when_to_change: Testing concurrent volume requests
zvol_threads:
  notes: zvol_threads controls the maximum number of threads handling concurrent
    volume I/O requests. The default of 32 threads behaves similarly to a disk
    with a 32-entry command queue. The actual number of threads required can vary
    widely by workload and available CPUs. If lock analysis shows high contention
    in the zvol taskq threads, then reducing the number of zvol_threads or workload
    queue depth can improve overall throughput. See also zvol_request_sync
  range: 1 to UINT_MAX
  tags:
  - volume
  verification: '``iostat`` using ``avgqu-sz`` or ``aqu-sz`` results'
  when_to_change: Matching the number of concurrent volume requests with workload
    requirements can improve concurrency
zvol_volmode:
  notes: '``zvol_volmode`` defines volume block devices behaviour when the ``volmode``
    property is set to ``default`` Note: to maintain compatibility with ZFS on
    BSD, "geom" is synonymous with "full" ===== ======= ===========================================
    value volmode Description ===== ======= ===========================================
    1 full legacy fully functional behaviour (default) 2 dev hide partitions on
    volume block devices 3 none not exposing volumes outside ZFS ===== =======
    ==========================================='
  range: 1, 2, or 3
  tags:
  - volume
  when_to_change: TBD
