name: Pull Request Docs Check

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install flake8
      run: pip install flake8
    - name: Lint python sources
      run: flake8

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Prepare
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git python3-pip mandoc
        pip install -r docs/requirements.txt
    - name: Gen_man_pages
      run: make man
    - name: Gen_feature_matrix
      run: make feature_matrix
    # Warnings are errors here: broken references and malformed markup must
    # not reach master. --keep-going reports every problem in one run.
    - name: Gen_sphinx
      run: make html SPHINXOPTS="-W --keep-going"
    - uses: actions/upload-artifact@v4
      with:
        name: DocumentationHTML
        path: docs/_build/html/
