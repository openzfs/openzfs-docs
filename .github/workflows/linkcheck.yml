name: Link check

# External links rot silently, so check them on a schedule instead of on
# every pull request: the result depends on third-party sites being up.
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Prepare
      run: |
        sudo apt-get update -y
        sudo apt-get install -y git python3-pip mandoc
        pip install -r docs/requirements.txt
    - name: Gen_man_pages
      run: make man
    - name: Gen_feature_matrix
      run: make feature_matrix
    - name: Linkcheck
      run: make linkcheck
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linkcheck-output
        path: docs/_build/linkcheck/
